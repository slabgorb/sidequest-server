<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Save Forensics — SideQuest</title>
<style>
  :root { --bg:#0e1116; --line:#2b313a; --txt:#d6deeb;
          --stored:#3fb950; --derived:#d29922; --absent:#6e7681; --acc:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.5 ui-monospace,Menlo,monospace; background:var(--bg); color:var(--txt); }
  header { padding:10px 16px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:baseline; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  .sub { color:var(--absent); }
  .legend { margin-left:auto; }
  .legend span { margin-right:14px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:5px; vertical-align:middle; }
  .layout { display:flex; height:calc(100vh - 47px); }
  aside { width:240px; border-right:1px solid var(--line); overflow:auto; }
  aside .save { padding:8px 12px; border-bottom:1px solid var(--line); cursor:pointer; }
  aside .save:hover { background:#1c2230; }
  aside .save.sel { background:#1f6feb33; border-left:3px solid var(--acc); }
  main { flex:1; overflow:auto; padding:0; }
  /* P0.1 — no panel fills/borders/radius. A section is a quiet label + one rule. */
  section { padding:14px 18px; border-bottom:1px solid var(--line); }
  .lbl { font-size:11px; text-transform:lowercase; letter-spacing:.08em; color:var(--absent); margin:0 0 8px; }
  pre { white-space:pre-wrap; word-break:break-word; margin:3px 0; }
  .tier-stored { color:var(--stored); }
  .tier-derived { color:var(--derived); }
  .tier-absent  { color:var(--absent); font-style:italic; }
  .warn { color:#f85149; }
  .seqs { color:var(--absent); font-size:11px; }
  /* macro strip */
  #strip { width:100%; display:block; }
  #strip rect.r { cursor:pointer; }
  #strip rect.r:hover { fill:var(--acc); }
  #strip rect.sel { stroke:var(--acc); stroke-width:1.5; }
  .axis { fill:var(--absent); font-size:10px; }
  /* P0.3 — the comparison: two aligned, like-formatted columns, adjacent */
  .cmp { display:grid; grid-template-columns:1fr 1fr; gap:0 28px; }
  .cmp h3 { font-size:11px; margin:0 0 6px; letter-spacing:.05em; }
  .cmp .d h3 { color:var(--derived); } .cmp .s h3 { color:var(--stored); }
  .kv { display:grid; grid-template-columns:130px 1fr; gap:2px 10px; align-items:baseline; }
  .kv .k { color:var(--absent); }
  .ok { color:var(--stored); } .div { color:var(--derived); }
  /* P0.4 — evidence: collapsed one-liners, native disclosure, zero JS */
  details { border-top:1px solid var(--line); }
  details > summary { cursor:pointer; padding:7px 0; color:var(--txt); list-style:none; }
  details > summary::-webkit-details-marker { display:none; }
  details > summary::before { content:"▸ "; color:var(--absent); }
  details[open] > summary::before { content:"▾ "; }
  details > summary .meta { color:var(--absent); margin-left:8px; }
  .ev-body { padding:4px 0 10px 14px; }
  table { width:100%; border-collapse:collapse; }
  td,th { border-bottom:1px solid var(--line); padding:4px 6px; text-align:left; vertical-align:top; }
  th { color:var(--absent); font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>Save Forensics</h1>
  <span class="sub">read-only post-mortem · sibling of the OTEL dashboard</span>
  <span class="legend">
    <span><i class="dot" style="background:var(--derived)"></i>derived (narrator believed)</span>
    <span><i class="dot" style="background:var(--stored)"></i>stored (ground truth)</span>
    <span><i class="dot" style="background:var(--absent)"></i>absent</span>
  </span>
</header>
<div class="layout">
  <aside id="rail"><div class="save sub" style="padding:12px">Loading saves…</div></aside>
  <main id="main"><section><p class="sub">Pick a save on the left.</p></section></main>
</div>
<script>
const rail = document.getElementById('rail');
const main = document.getElementById('main');
let curSlug = null;
let curTimeline = [];

const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const j = o => esc(JSON.stringify(o, null, 2));
const SVGNS = 'http://www.w3.org/2000/svg';

async function getJSON(u){ const r = await fetch(u); if(!r.ok) throw new Error(u+' '+r.status); return r.json(); }

async function loadSaves(){
  let saves;
  try { saves = await getJSON('/api/debug/saves'); }
  catch(e){ rail.innerHTML = '<div class="save warn">'+esc(e.message)+'</div>'; return; }
  if(!saves.length){ rail.innerHTML = '<div class="save sub">No saves found.</div>'; return; }
  rail.innerHTML = '';
  for(const s of saves){
    const d = document.createElement('div');
    d.className = 'save'; d.dataset.slug = s.slug;
    d.innerHTML = '<b>'+esc(s.slug)+'</b><br><span class="sub">'+
      esc(s.genre)+' / '+esc(s.world)+'</span>';
    d.onclick = () => selectSave(s.slug, d);
    rail.appendChild(d);
  }
}

async function selectSave(slug, el){
  curSlug = slug;
  document.querySelectorAll('.save').forEach(n => n.classList.remove('sel'));
  el.classList.add('sel');
  main.innerHTML = '<section><p class="sub">Loading timeline…</p></section>';
  let tl;
  try { tl = await getJSON('/api/debug/save/'+encodeURIComponent(slug)+'/timeline'); }
  catch(e){ main.innerHTML = '<section><p class="warn">'+esc(e.message)+'</p></section>'; return; }
  if(!Array.isArray(tl) || !tl.length){
    main.innerHTML = '<section><p class="sub">No narrative rounds in this save.</p></section>'; return; }
  curTimeline = tl;
  main.innerHTML =
    '<section><p class="lbl">macro — '+esc(slug)+' · '+esc(tl.length)+
      ' rounds · click a column</p><svg id="strip"></svg>'+
      '<div id="axis" class="sub" style="font-size:11px;margin-top:4px"></div></section>'+
    '<div id="drill"><section><p class="sub">Pick a round above.</p></section></div>';
  renderStrip(tl);
}

// P0.2 — the whole game as one small-multiple strip, replacing the 117-row
// scroll list. event-density per round + clickable round axis. (The
// cumulative-KnownFacts curve is P1.1 — needs the per-round fold; documented.)
function renderStrip(tl){
  const svg = document.getElementById('strip');
  const W = svg.clientWidth || svg.parentNode.clientWidth || 900;
  const H = 70, PAD = 6, n = tl.length;
  const bw = Math.max(1, (W - PAD*2) / n);
  const counts = tl.map(t => Object.values(t.event_kind_counts||{})
    .reduce((a,b)=>a+(+b||0), 0));
  const max = Math.max(1, ...counts);
  svg.setAttribute('viewBox', '0 0 '+W+' '+H);
  svg.setAttribute('height', H);
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  tl.forEach((t, i) => {
    const c = counts[i];
    const h = c === 0 ? 2 : Math.round((H - 16) * c / max) + 2;
    const x = PAD + i*bw;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('class', 'r');
    rect.setAttribute('x', x.toFixed(2));
    rect.setAttribute('y', (H - 12 - h).toFixed(2));
    rect.setAttribute('width', Math.max(0.5, bw - 0.5).toFixed(2));
    rect.setAttribute('height', h);
    rect.setAttribute('fill', c === 0 ? 'var(--absent)' : '#3a4a63');
    rect.dataset.round = t.round;
    const tip = document.createElementNS(SVGNS, 'title');
    tip.textContent = 'Round '+t.round+' · seq '+(t.seq_start??'–')+'–'+
      (t.seq_end??'–')+' · '+(Object.entries(t.event_kind_counts||{})
      .map(([k,v])=>k+'×'+v).join(' ') || 'no events');
    rect.appendChild(tip);
    rect.addEventListener('click', () => selectTurn(t.round));
    svg.appendChild(rect);
  });
  // sparse round axis: first · mid · last
  const ax = document.getElementById('axis');
  const f = tl[0].round, m = tl[Math.floor(n/2)].round, l = tl[n-1].round;
  ax.textContent = 'R'+f+'  …  R'+m+'  …  R'+l;
}

function markSel(round){
  document.querySelectorAll('#strip rect').forEach(r =>
    r.classList.toggle('sel', +r.dataset.round === +round));
}

// flatten the stored snapshot to the fields a GM audits — never a 20KB dump
function storedRows(snap){
  if(!snap || typeof snap !== 'object') return [['snapshot','— unavailable']];
  if(snap.error) return [['snapshot', '⚠ '+snap.error]];
  const rows = [];
  const tm = snap.turn_manager || {};
  rows.push(['round', tm.round!=null ? String(tm.round) : '—']);
  rows.push(['region', snap.current_region || '—']);
  rows.push(['player_dead', String(!!snap.player_dead)]);
  const seats = snap.player_seats || {};
  rows.push(['seats', Object.keys(seats).length ? Object.keys(seats).join(', ') : '—']);
  const locs = snap.character_locations || {};
  for(const [who, where] of Object.entries(locs)) rows.push(['loc · '+who, where]);
  for(const ch of (snap.characters || [])){
    const co = ch.core || {};
    const inv = (co.inventory && co.inventory.items) || [];
    rows.push(['pc · '+(co.name||'?'),
      'L'+(co.level??'?')+' · xp '+(co.xp??'?')+' · '+inv.length+' items']);
  }
  const tr = snap.active_tropes || [];
  if(tr.length) rows.push(['active tropes',
    tr.map(t => (t.id||'?')+'('+(t.status||'?')+')').join(', ')]);
  return rows;
}

async function selectTurn(round){
  markSel(round);
  const drill = document.getElementById('drill');
  drill.innerHTML = '<section><p class="sub">Loading round '+esc(round)+'…</p></section>';
  let b;
  try { b = await getJSON('/api/debug/save/'+encodeURIComponent(curSlug)+
    '/turn/'+encodeURIComponent(round)); }
  catch(e){ drill.innerHTML = '<section><p class="warn">'+esc(e.message)+'</p></section>'; return; }
  let snap = null;
  try { snap = await getJSON('/api/debug/save/'+
    encodeURIComponent(curSlug)+'/snapshot'); } catch(e){ snap = {error:e.message}; }

  // ---- DERIVED summary (KnownFacts the narrator had by this round) ----
  const derEntries = Object.entries(b.derived || {});
  const cats = {};
  for(const [,v] of derEntries){
    const c = (v.value && v.value.category) || '—';
    cats[c] = (cats[c]||0) + 1;
  }
  const catLine = Object.entries(cats).sort((a,b)=>b[1]-a[1])
    .map(([c,n]) => esc(c)+' '+n).join(' · ') || '—';
  const unp = (b.unparseable_seqs||[]).length
    ? '<div class="warn">⚠ unparseable event seqs: '+
      b.unparseable_seqs.map(esc).join(', ')+'</div>' : '';

  const derCol =
    '<div class="kv">'+
    '<span class="k">facts known</span><span class="tier-derived">'+esc(derEntries.length)+'</span>'+
    '<span class="k">by category</span><span>'+catLine+'</span>'+
    '<span class="k">integrity</span><span>'+(
      (b.unparseable_seqs||[]).length
        ? '<span class="warn">'+(b.unparseable_seqs.length)+' unparseable</span>'
        : '<span class="ok">clean</span>')+'</span>'+
    '</div>';

  // ---- RECORDED THIS ROUND (per-round, varies — scrapbook + narrative +
  // events). The game_state snapshot is TERMINAL-only (one row, round 117);
  // showing it per-round is a lie. The per-round recorded reality lives in
  // scrapbook_entries.location/scene + narrative + events. ----
  const sb = b.scrapbook || [];
  const locs = [...new Set(sb.map(s => s.location).filter(x => x != null && x !== ''))];
  const scenes = sb.map(s => (s.scene_title||'?')+' ('+(s.scene_type||'?')+
    ') ['+(s.render_status||'?')+']');
  const authors = [...new Set((b.narrative||[]).map(n => n.author).filter(Boolean))];
  const evKinds = {};
  for(const e of (b.events||[])) evKinds[e.kind] = (evKinds[e.kind]||0)+1;
  const evLine = Object.entries(evKinds).map(([k,n]) => k+'×'+n).join(' ') || '—';
  const recRows = [
    ['location', locs.length ? locs.join('  ·  ') : '— none recorded this round'],
    ['scene', scenes.length ? scenes.join('  ·  ') : '—'],
    ['narrators', authors.length ? authors.join(', ') : '—'],
    ['events', evLine],
  ];
  const recCol = '<div class="kv">'+ recRows.map(([k,v]) =>
    '<span class="k">'+esc(k)+'</span><span class="tier-stored">'+esc(v)+'</span>').join('') +'</div>';

  // ---- evidence (collapsed) ----
  const narr = (b.narrative||[]).map(nn =>
    '<pre><b>'+esc(nn.author)+':</b> '+esc(nn.content)+'</pre>').join('')
    || '<span class="tier-absent">— no narrative this round</span>';

  const evs = (b.events||[]).map(e =>
    '<pre>#'+esc(e.seq)+' '+esc(e.kind)+'\n'+j(e.payload)+'</pre>').join('')
    || '<span class="tier-absent">— no events this round</span>';

  const ledger = derEntries.length
    ? '<table><tr><th>fact_id</th><th>category</th><th>summary</th><th>provenance</th></tr>'+
      derEntries.map(([k,v]) => '<tr><td class="tier-derived">'+esc(k)+'</td><td>'+
        esc(v.value && v.value.category)+'</td><td>'+esc(v.value && v.value.summary)+
        '</td><td class="seqs">seq '+(v.source_seqs||[]).map(esc).join(', ')+
        '</td></tr>').join('')+'</table>'
    : '<span class="tier-absent">— no event carried any fact through this turn</span>';

  const proj = (b.projection||[]).map(p =>
    '<tr><td>'+esc(p.event_seq)+'</td><td>'+esc(p.player_id)+'</td>'+
    '<td class="'+(p.include?'ok':'tier-absent')+'">'+(p.include?'shown':'hidden')+'</td>'+
    '<td><pre>'+j(p.payload)+'</pre></td></tr>').join('')
    || '<tr><td colspan="4" class="tier-absent">— no projection rows</td></tr>';

  const scrap = (b.scrapbook||[]).map(s =>
    '<pre><b>'+esc(s.scene_title)+'</b> ('+esc(s.scene_type)+' @ '+esc(s.location)+
    ') ['+esc(s.render_status)+']\n'+esc(s.narrative_excerpt)+'</pre>').join('')
    || '<span class="tier-absent">— no scrapbook entry</span>';

  const evCount = (b.events||[]).length, scCount = (b.scrapbook||[]).length;

  drill.innerHTML =
    '<section><p class="lbl">comparison · round '+esc(round)+
      ' — what the narrator had established, vs what was recorded this round'+
      ' (SideQuest stores no per-round snapshot — see terminal snapshot below)</p>'+ unp +
      '<div class="cmp"><div class="d"><h3>DERIVED — narrator believed (by R'+esc(round)+
        ')</h3>'+derCol+'</div>'+
      '<div class="s"><h3>RECORDED THIS ROUND</h3>'+recCol+'</div></div></section>'+
    '<section><p class="lbl">evidence</p>'+
      '<details><summary>narrative<span class="meta">round '+esc(round)+
        '</span></summary><div class="ev-body">'+narr+'</div></details>'+
      '<details><summary>event stream (verbatim)<span class="meta">'+esc(evCount)+
        ' events</span></summary><div class="ev-body">'+evs+'</div></details>'+
      '<details><summary>KnownFacts ledger<span class="meta">'+esc(derEntries.length)+
        ' facts</span></summary><div class="ev-body">'+ledger+'</div></details>'+
      '<details><summary>per-player projection lens<span class="meta">'+
        esc((b.projection||[]).length)+' rows</span></summary><div class="ev-body">'+
        '<table><tr><th>seq</th><th>player</th><th>visibility</th><th>projected payload</th></tr>'+
        proj+'</table></div></details>'+
      '<details><summary>scrapbook<span class="meta">'+esc(scCount)+
        ' entries</span></summary><div class="ev-body">'+scrap+'</div></details>'+
      '<details><summary>terminal snapshot<span class="meta">round '+
        esc((snap && snap.turn_manager && snap.turn_manager.round) ?? '?')+
        ' · the ONLY stored snapshot — identical on every round, NOT this round’s state'+
        '</span></summary><div class="ev-body"><div class="kv">'+
        storedRows(snap).map(([k,v]) => '<span class="k">'+esc(k)+
          '</span><span class="tier-stored">'+esc(v)+'</span>').join('')+
        '</div><details><summary>raw JSON</summary><div class="ev-body">'+
        '<pre class="tier-stored">'+j(snap)+'</pre></div></details></div></details>'+
    '</section>';
}

loadSaves();
</script>
</body>
</html>
