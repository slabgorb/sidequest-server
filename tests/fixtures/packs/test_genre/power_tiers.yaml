# Power Tiers — mutant_wasteland
# Per-class visual descriptions at each level range.
# Injected into narrator character context so prose and portraits
# reflect actual power level. max_level: 10 (default)
#
# Keyed by class from rules.yaml:
#   Scavenger, Mutant, Pureblood, Synth, Beastkin, Tinker

Scavenger:
  - level_range: [1, 3]
    label: picker
    player: >-
      threadbare scavenged clothing with mismatched patches, a satchel
      of junk parts, improvised weapon — sharpened rebar or pipe wrench,
      no armor just layered rags, salvage-wrapped boots held with wire,
      underfed and wary, fingers quick from sorting through rubble
    npc: >-
      wasteland junk picker in torn clothing faded to grey, pulling a
      handcart of scrap, barefoot or tire-rubber sandals, unarmed beyond
      a prying bar, gaunt and sun-damaged, eyes scanning for salvage
  - level_range: [4, 6]
    label: scrounger
    player: >-
      functional scrap armor — sheet metal plates riveted over leather,
      reliable salvaged weapon with personal modifications, utility belt
      heavy with pouches and tools, gas mask at the neck, lockpicks and
      a pry bar on the hip, the practiced efficiency of someone who can
      strip a ruin in an hour
    npc: >-
      settlement trade scavenger in patched but serviceable gear, a mule
      or pushcart loaded with sorted salvage, knife and a sawed-off for
      protection, knows the value of everything at a glance
  - level_range: [7, 9]
    label: prospector
    player: >-
      custom salvage rig — reinforced harness with attached tool arms,
      modular armor assembled from the best finds, a signature weapon
      built from pre-war parts nobody else could repair, night-vision
      goggles, radiation counter, the confident stride of someone who
      has cracked bunkers others wouldn't touch
    npc: >-
      legendary scavenger with a reputation and a territory, full pack
      frame loaded with pristine pre-war finds, armed escort of junior
      scavengers, tactical gear maintained to military standard
  - level_range: [10, 10]
    label: vaultbreaker
    player: >-
      pre-war hazmat suit modified with armor plating and tool mounts,
      legendary salvage weapon that is part cutting torch part firearm,
      drone companion carrying additional gear, a map case of bunker
      locations tattooed on the forearm, the aura of someone who has
      walked into sealed vaults and walked back out rich

Mutant:
  - level_range: [1, 3]
    label: changeling
    player: >-
      loose clothing to hide early mutations — discolored skin patches,
      an extra finger, bioluminescent veins visible at the wrist, no
      weapon needed when your hands are becoming something else, wrapped
      limbs and a hood pulled low, the hunched posture of someone
      still ashamed of what they're becoming
    npc: >-
      drifter with visible minor mutations — odd skin color, asymmetric
      features, wearing gloves and a scarf to hide the worst of it,
      shunned by pureblood settlements, desperate and unpredictable
  - level_range: [4, 6]
    label: adapted
    player: >-
      mutations becoming functional — armored skin plates on forearms,
      bioluminescent markings that pulse with emotion, elongated limbs
      or enhanced musculature, clothing cut to accommodate new anatomy,
      a weapon that works with the mutation not against it, the steady
      gaze of someone who has accepted what they are
    npc: >-
      mutant enforcer with visible combat mutations — bone spurs, thick
      hide, oversized fists, wearing minimal armor over natural
      protection, faction tattoos marking them as accepted by a clan
  - level_range: [7, 9]
    label: evolved
    player: >-
      dramatic mutation integration — bioluminescent patterns covering
      the body like living circuit boards, natural armor plates that
      rival pre-war tech, mutation-grown weapons — bone blades or acid
      glands, the imposing silhouette of someone more than human,
      clothing is minimal and decorative over a body that is its own weapon
    npc: >-
      mutant elder with profound physical transformation — towering
      frame or multiple limbs, skin like bark or stone, eyes that glow
      with inner radiation, revered by mutant communities as proof of
      evolution's promise
  - level_range: [10, 10]
    label: apex strain
    player: >-
      transcendent mutation — the body has become something new entirely,
      bioluminescent aura visible at all times, natural armor stronger
      than any salvage, mutation abilities that warp the environment
      around them, every movement radiating controlled power, the
      terrifying beauty of a new species looking back at the old world

Pureblood:
  - level_range: [1, 3]
    label: sheltered
    player: >-
      clean pre-war clothing carefully maintained and patched, a small
      caliber pistol held uncertainly, medical mask and gloves against
      contamination, soft hands and pale skin from bunker life, a
      notebook of old-world knowledge, the wide-eyed look of someone
      who grew up reading about the wasteland not living in it
    npc: >-
      bunker-born civilian in faded but clean pre-war clothes, clutching
      a bag of trade goods, sunburning for the first time, no visible
      weapons, dependent on settlement walls for safety
  - level_range: [4, 6]
    label: wastelander
    player: >-
      pre-war clothing adapted for the wastes — reinforced at stress
      points, proper boots, a reliable firearm maintained with old-world
      precision, rad pills and a dosimeter on the belt, sunburn lines
      from goggles, the toughening look of someone who has stopped
      flinching at every noise
    npc: >-
      pureblood trader or medic in practical wasteland gear, a pre-war
      backpack full of medical supplies or tech components, sidearm
      holstered properly, valued by settlements for old-world knowledge
  - level_range: [7, 9]
    label: commander
    player: >-
      restored pre-war military uniform or lab coat over modern armor,
      precision weapon maintained to factory spec, command tablet with
      functioning pre-war tech nobody else can operate, the bearing of
      someone who carries old-world authority and has earned wasteland
      respect to back it up
    npc: >-
      pureblood leader of a settlement or research outpost, pre-war
      technology functioning under their care, armed guards loyal to
      the knowledge they represent, clean clothes in a dirty world
  - level_range: [10, 10]
    label: architect
    player: >-
      pristine pre-war power armor restored to working condition by
      patient expertise, legendary pre-war weapon — laser rifle or
      plasma caster, a functioning AI companion in a wrist terminal,
      the calm authority of someone rebuilding civilization one
      settlement at a time, followers who believe in the old world's return

Synth:
  - level_range: [1, 3]
    label: unit
    player: >-
      synthetic skin showing wear — hairline seams visible at joints,
      one eye slightly different color from recalibration, standard-issue
      clothing that doesn't quite fit a body made to spec, no weapons
      beyond built-in strength, the uncanny stillness of someone who
      doesn't breathe when they forget to pretend
    npc: >-
      damaged synth with visible mechanical components — exposed wiring
      at the neck, a hand missing its skin covering, movements slightly
      too precise, wearing scavenged clothing to pass as human
  - level_range: [4, 6]
    label: integrated
    player: >-
      synthetic body customized with salvaged upgrades — reinforced
      chassis visible through worn skin, optic enhancement glowing
      faintly behind one eye, modular weapon mount on one arm, clothing
      chosen for identity not necessity, the deliberate movements of
      someone who has chosen who they want to be
    npc: >-
      synth mechanic or courier with visible self-modifications, tools
      built into the forearms, synthetic skin painted or tattooed as
      personal expression, trusted in settlements that accept synths
  - level_range: [7, 9]
    label: chassis
    player: >-
      heavily modified synthetic frame — military-grade armor plating
      installed over the original chassis, integrated weapon systems
      deployed from forearm panels, sensor suite replacing one eye with
      a multi-spectrum optic, movement that shifts between human and
      machine depending on the situation
    npc: >-
      synth enforcer or protector with full combat modifications,
      armored frame no longer attempting to pass as human, integrated
      heavy weapons, the implacable advance of something that does not
      tire or fear
  - level_range: [10, 10]
    label: sovereign
    player: >-
      fully self-actualized synthetic being — chassis rebuilt from the
      finest pre-war components, body that shifts between human
      appearance and combat configuration at will, integrated systems
      that interface with any pre-war technology, the presence of a
      being that has transcended its original programming and chosen
      its own purpose

Beastkin:
  - level_range: [1, 3]
    label: pup
    player: >-
      uplifted animal features still dominant — fur or feathers or
      scales with minimal clothing, crude tool use with hands still
      adapting to fingers, a simple weapon — sharpened bone or a found
      blade, animal eyes still adjusting to human-level cognition,
      the twitchy alertness of prey-species instincts in a thinking mind
    npc: >-
      young beastkin foraging at the edge of a settlement, more animal
      than person in posture and movement, simple hide wrapping, wary
      of humans, communicating in broken speech and gesture
  - level_range: [4, 6]
    label: blooded
    player: >-
      animal and human features in functional balance — custom armor
      shaped for a non-human frame, a weapon modified for clawed hands
      or a tail's counterbalance, clothing that accommodates fur and
      spines, tribal markings in natural pigments, the coiled readiness
      of a predator who has learned to plan
    npc: >-
      beastkin warrior or scout in tribal gear adapted from salvage,
      natural weapons supplemented by a blade or spear, moving with
      inhuman grace through terrain others struggle with
  - level_range: [7, 9]
    label: alpha
    player: >-
      fully realized hybrid physique — natural armor of thickened hide
      or scales reinforced with salvaged plating, weapons that extend
      natural capabilities — a blade mounted on a tail, claws sheathed
      in metal, tribal leadership markings and trophies, the commanding
      presence of a pack leader who bridges two worlds
    npc: >-
      beastkin clan leader in elaborate tribal regalia mixed with
      salvaged technology, surrounded by pack members, natural and
      crafted weapons combined, commands territory through strength
      and cunning both
  - level_range: [10, 10]
    label: primal lord
    player: >-
      apex predator transcending both animal and human — massive frame
      combining the best of both physiologies, natural armor that
      deflects bullets, senses that miss nothing, tribal and salvaged
      technology worn as decoration on a body that needs neither,
      the territorial presence of something at the absolute top of
      the food chain

Tinker:
  - level_range: [1, 3]
    label: tinkerer
    player: >-
      grease-stained coveralls with pockets full of parts, goggles
      pushed up on forehead, a cobbled-together gadget that mostly
      works, no real weapon just a heavy wrench and a soldering iron,
      burns and calluses on the hands, a belt of scavenged components
      that jingle when walking, the distracted look of someone always
      thinking about the next build
    npc: >-
      settlement repair worker in oil-stained clothes, surrounded by
      half-finished projects, trading small fixes for food, carrying
      a toolbox worth more than everything else they own
  - level_range: [4, 6]
    label: mechanic
    player: >-
      custom work vest with integrated tool holsters and a wrist-mounted
      diagnostic screen, a proper workshop weapon — converted nail gun
      or electrified prod, light armor with built-in pouches for
      components, welding goggles with one lens replaced by a magnifier,
      the ink-stained hands of someone who reads schematics for fun
    npc: >-
      settlement engineer maintaining critical infrastructure, personal
      workshop with functioning power tools, respected for keeping the
      generators and water purifiers alive, armed with custom creations
  - level_range: [7, 9]
    label: artificer
    player: >-
      powered exoskeleton frame built from scratch — hydraulic-assisted
      limbs and a heads-up display, signature weapon that is a one-of-a-kind
      creation — rail gun or tesla coil or drone swarm controller,
      armor festooned with gadgets each serving a specific purpose,
      the workshop has become wearable
    npc: >-
      legendary engineer whose creations define a settlement's power,
      personal mech suit or vehicle built from salvage, apprentices
      maintaining a fleet of devices, a walking arsenal of invention
  - level_range: [10, 10]
    label: forge master
    player: >-
      walking workshop of integrated pre-war and custom technology —
      powered armor that builds and repairs itself, an AI-assisted
      fabrication system mounted on the back, weapons that reconfigure
      for any situation, drones orbiting like loyal pets, the quiet
      confidence of someone who can build anything from nothing and
      the wasteland knows it
