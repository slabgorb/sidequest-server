- affected_cultures:
  - Vaultborn
  - Drifters
  cultural_impact: "The Drifters blame the Vaultborn for poisoning the steppe and\
    \ turning their children into 'glass-touched' \u2014 born with translucent skin\
    \ and bones that glow faintly blue. The Vaultborn consider the Unsealing a sacred\
    \ tragedy and believe the Third Conclave still lives somewhere in the fused wreckage,\
    \ dreaming in machine-code. Drifter riders spit when they pass Vaultborn traders.\
    \ Vaultborn archivists insist the Drifters were warned and chose to stay."
  era: 1,200 years ago
  faction_grudges:
  - from: Drifters
    reason: The Unsealing poisoned the eastern steppe, mutated Drifter bloodlines,
      and the Vaultborn have never acknowledged fault or offered restitution
    to: Vaultborn
  - from: Vaultborn
    reason: "Drifter raiding parties have looted Vaultborn surface outposts for centuries,\
      \ claiming it as 'blood-debt collection' \u2014 the Vaultborn call it theft"
    to: Drifters
  lost_arts:
  - "The Third Conclave's reactor design \u2014 no Vaultborn engineer has been able\
    \ to replicate fusion power since"
  - "The Drifters' old grazing songs, which could calm any animal \u2014 the static-voices\
    \ in their heads drowned them out"
  - Pre-Unsealing cartography of the eastern steppe, now uselessly inaccurate
  monuments:
  - "The Singing Pit \u2014 a Scrapborn salvage site built into the crater rim, where\
    \ scavengers pull half-melted Vaultborn tech from the glass and sell it at tremendous\
    \ markup"
  - "Iniarap\xE5cu of the Glass Flat's Cairn \u2014 a Drifter monument on the edge\
    \ of the glass plain, a tower of fused bones and scrap metal where riders leave\
    \ offerings before crossing"
  name: The Unsealing of Silo Prime
  summary: "Silo Prime, the largest and most advanced Vaultborn bunker complex, suffered\
    \ a catastrophic reactor meltdown when its governing intelligence \u2014 a half-sentient\
    \ maintenance AI called the Third Conclave \u2014 attempted to unseal the doors\
    \ and reclaim the surface. The resulting detonation vaporized the upper silo levels,\
    \ sent a plume of mutagenic isotopes across the eastern steppe, and fused the\
    \ surrounding earth into a vast plain of black glass that still hums with a low,\
    \ mournful tone on windless nights. The Drifters, who had been peacefully grazing\
    \ their herds across that steppe for generations, were caught in the fallout and\
    \ suffered mass mutations \u2014 their mounts warped into the strange, multi-limbed\
    \ beasts they ride today, and their singers began to hear voices in the static\
    \ of old radio frequencies."
  terrain_scars:
  - description: "A 40-mile-wide plain of fused black glass where Silo Prime once\
      \ stood. The glass hums at a frequency that causes nausea in the unprotected\
      \ and vivid hallucinations in the glass-touched. Beneath the surface, collapsed\
      \ silo levels are visible like frozen organs in dark amber. Scrapborn salvage\
      \ crews work the edges with hammers and pry-bars, but no one goes to the center\
      \ \u2014 those who do report seeing a vast eye of green light blinking slowly\
      \ beneath them."
    name: The Glass Flat
    region: ''
    type: crater
  - description: A belt of grey, powdery wasteland downwind of the Glass Flat where
      nothing grows and the soil itself is mildly radioactive. Drifter caravans cross
      it wrapped in wet hide, their mounts fitted with cloth masks. The dust gets
      into everything. Settlements on its border suffer a slow rust that eats metal
      and bone alike. Teeth fall out. Blades crumble. The Drifters call it 'the Conclave's
      breath.'
    name: "The Przy\xE5 Dust"
    region: ''
    type: dead_zone
- affected_cultures:
  - Scrapborn
  - Greenfolk
  cultural_impact: "The destruction of Noce's Hub shattered what had been a cautious\
    \ trade relationship between Scrapborn and Greenfolk. Scrapborn settlements now\
    \ burn a perimeter of cleared earth around their walls and kill any Greenfolk\
    \ spore-carrier found within a mile of their scrap-heaps. The Greenfolk see the\
    \ Scrapborn's fire-clearings as acts of ecological violence. Kuinem the Overgrown\
    \ is either a war criminal or a saint depending on who you ask \u2014 their body\
    \ was never found, and Greenfolk pilgrims claim the massive banyan-like tree at\
    \ the center of the ruins still speaks with Kuinem's voice, though only to those\
    \ with chlorophyll in their blood."
  era: 600 years ago
  faction_grudges:
  - from: Scrapborn
    reason: The Rooting destroyed their greatest city and killed hundreds; Scrapborn
      mothers still use 'the green comes' as a threat to frighten children
    to: Greenfolk
  - from: Greenfolk
    reason: After the Rooting, Scrapborn began systematic burn-clearing and have torched
      several Greenfolk nurseries in retaliatory raids they call 'weeding'
    to: Scrapborn
  lost_arts:
  - "Noce's Hub was the only settlement that had partially restored electrical lighting\
    \ \u2014 the generator designs were buried under root-mass and never recovered"
  - "The Scrapborn art of 'junction-singing' \u2014 a method of testing wire integrity\
    \ by ear \u2014 was centered in Noce's Hub and died with its practitioners"
  - The specific biotech formulas Kuinem extracted from Lab Sigma, which the Vaultborn
    desperately want back
  monuments:
  - "The Kuinem Tree \u2014 a grotesque, building-sized growth at the center of the\
    \ ruins that pulses with bioluminescence and has been observed to move its branches\
    \ toward sound"
  - "Hicienck of the Singing Junction's Wall \u2014 a salvaged steel barricade on\
    \ the western approach to The Bright Grid, covered in scratched warnings about\
    \ root-signs and spore-weather, maintained by Scrapborn patrols"
  name: The Rooting of Noce's Hub
  summary: "The Scrapborn city of Noce's Hub \u2014 a thriving trade settlement built\
    \ in the shell of a pre-war industrial complex \u2014 was consumed overnight when\
    \ a Greenfolk elder named Kuinem the Overgrown performed a ritual they called\
    \ the Great Sowing. Kuinem had been experimenting with pre-war agricultural biotech\
    \ recovered from Lab Sigma, splicing it with their own spore-based mutations.\
    \ The resulting organism \u2014 a hyper-aggressive root network with rudimentary\
    \ intelligence \u2014 erupted from the soil beneath Noce's Hub and grew through\
    \ every structure in a single night, crushing steel beams, splitting concrete,\
    \ and entombing hundreds of sleeping Scrapborn in cocoons of living wood. Those\
    \ who survived reported the roots whispering to them, offering 'peace in the green.'\
    \ The Greenfolk claim Kuinem was trying to heal the poisoned earth. The Scrapborn\
    \ say it was an invasion."
  terrain_scars:
  - description: "The remains of Noce's Hub, now a miles-wide jungle of hyper-mutated\
      \ vegetation growing through and around industrial wreckage. Steel girders serve\
      \ as trellises for carnivorous orchids. Roots as thick as trains have cracked\
      \ open factory floors. The air is thick with spores that cause temporary synesthesia\
      \ \u2014 you can taste colors, hear the texture of bark. Greenfolk communities\
      \ thrive in the upper canopy. Below, in the dark at ground level, Scrapborn\
      \ salvage crews creep through root-tunnels hunting for pre-Rooting tech, and\
      \ sometimes the roots grab them."
    name: The Blooming Tangle
    region: ''
    type: ruin
  - description: A ring of land surrounding the Blooming Tangle where the root network
      is slowly expanding outward, about a foot per year. Trees here grow in geometric
      patterns. Animals born in the zone have bark-like patches on their skin and
      seem to move in coordinated groups, like cells in an organism. Scrapborn burn-crews
      fight the expansion constantly. Some Drifters have reported that their mounts
      refuse to enter the area, planting their feet and screaming.
    name: The Tangled Nursery
    region: ''
    type: cursed_ground
- affected_cultures:
  - Drifters
  - Vaultborn
  - Scrapborn
  cultural_impact: "The Bargain is the defining shame of three cultures. The Drifters\
    \ revere Karta but cannot speak of the forty tithe-years without grief; families\
    \ still search for descendants lost into the Vaults. The Vaultborn lost their\
    \ only leverage over the surface world and have grown increasingly isolationist,\
    \ sealing Vault Echo entirely \u2014 no one has entered or exited in a century,\
    \ and strange lights are seen in its air-shafts at night. The Scrapborn profited\
    \ enormously from the rain-catcher technology and built Tood's Dome into a trade\
    \ hub, but everyone knows the tech was born from stolen children, and Drifter\
    \ merchants negotiate with visible contempt."
  era: 300 years ago
  faction_grudges:
  - from: Drifters
    reason: "Forty years of child-tithe; an entire generation of Drifter children\
      \ converted into Vaultborn drones \u2014 some Drifter clans still carry lists\
      \ of the taken and swear recovery oaths"
    to: Vaultborn
  - from: Vaultborn
    reason: Tood's Dome profited from stolen Vaultborn technology and has refused
      every demand for its return, citing 'finder's law'
    to: Scrapborn
  - from: Drifters
    reason: The Scrapborn commodified a technology born from Drifter suffering, charging
      the very people whose children paid for it
    to: Scrapborn
  lost_arts:
  - "The original atmospheric moisture harvester \u2014 Karta destroyed it during\
    \ her escape, and the Vaultborn lacked the parts to rebuild"
  - "Drifter storm-reading, a method of predicting weather by reading mount behavior\
    \ \u2014 the tithe-generation gap broke the oral tradition, and modern Drifters\
    \ rely on crude instruments instead"
  - "Whatever the Vaultborn were doing inside Vault Echo after it sealed \u2014 Scrapborn\
    \ listening posts at the surface vents report mechanical sounds, chanting, and\
    \ what might be laughter"
  monuments:
  - "Karta's Road \u2014 a trail of red-painted stones stretching from Vault Echo\
    \ to Tood's Dome, maintained by Drifter riders who repaint them every spring in\
    \ iron-oxide pigment"
  - "The Tithe Wall inside Tood's Dome \u2014 Odige Fuseborn carved the names of every\
    \ known tithed child into a sheet of scrap steel; Drifters visiting Tood's Dome\
    \ touch it in silence before conducting any trade"
  - "Vault Echo's Sealed Gate \u2014 a massive blast door fused shut from the inside,\
    \ covered in Drifter graffiti and offerings of children's shoes"
  name: The Bargain at Blind Reach
  summary: "When a decade-long drought drove the Drifters to the edge of extinction,\
    \ their greatest rider-poet Sin\xE4 the Storm led a desperate caravan to Vault\
    \ Echo, where the Vaultborn leader Vous-nul controlled the only working atmospheric\
    \ moisture harvester on the continent. Vous-nul offered water in exchange for\
    \ something monstrous: a yearly tithe of Drifter children to replenish the Vaultborn\
    \ gene pool, which had grown dangerously inbred after twelve centuries underground.\
    \ Sin\xE4 accepted. For forty years the tithe was paid \u2014 Drifter children\
    \ disappeared into Vault Echo and emerged years later as pale, numbered, clinical\
    \ strangers who no longer recognized their birth-families. The arrangement ended\
    \ in blood when Karta of the Red Dust, a tithed child who remembered her Drifter\
    \ name, sabotaged the moisture harvester from within and rode out of Vault Echo\
    \ on a stolen mount, carrying the harvester's control-seed in her teeth. She delivered\
    \ it to the Scrapborn at Tood's Dome, who reverse-engineered it into cruder but\
    \ functional rain-catchers \u2014 and charged everyone for the privilege."
  terrain_scars:
  - description: "The dry canyon where Sin\xE4 the Storm first met Vous-nul's emissaries.\
      \ The canyon walls are carved with the terms of the Bargain in both Drifter\
      \ trail-script and Vaultborn clinical notation. The carvings have been defaced,\
      \ restored, and defaced again so many times that they now form a palimpsest\
      \ of rage and grief, layers deep. A Drifter camp at the canyon mouth \u2014\
      \ Salt Camp \u2014 serves as both a trading post and a memorial site. Psychic\
      \ frogs living in the canyon's one remaining spring are said to croak the names\
      \ of the tithed children at dusk, though the Drifters insist this is not a legend\
      \ but an observable fact."
    name: Blind Reach
    region: ''
    type: ruin
  - description: The sealed Vaultborn bunker complex, its surface structures crumbling
      but its underground levels apparently still active. The ground above throbs
      with a low vibration felt in the bones. Grass grows in perfect circles around
      the air vents, each blade exactly the same height. Drifter riders report their
      mounts becoming agitated within a mile of the site, and any metal brought near
      the vents becomes briefly magnetized. At night, a column of pale green light
      occasionally pulses from the main shaft, visible for miles across the steppe.
      No one has gone in. The last Scrapborn salvage crew to try found the door warm
      to the touch and heard someone on the other side, breathing.
    name: Vault Echo
    region: ''
    type: cursed_ground
