routes:
- danger: deadly
  description: A choking passage through irradiated dust downwind of the Glass Flat,
    where unshielded travelers suffer hallucinations, tooth loss, and the slow rust
    that eats metal and bone.
  distance: medium
  from_id: glass_flat
  name: The Conclave's Breath
  to_id: przyå_dust
- danger: dangerous
  description: A Drifter caravan route skirting the dust belt's western edge toward
