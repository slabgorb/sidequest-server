cosmology: "The people of the Flickering Reach do not agree on gods, but they agree\
  \ on voices. The Drifter singers hear them in radio static \u2014 the residual broadcasts\
  \ of pre-war AIs, maintenance logs, weather reports, and what might be prayers recorded\
  \ by people dead for millennia, all tangled together into a humming chorus the Drifters\
  \ call the Long Signal. \xC5ych Przys\xE5uchkin, the most revered living singer,\
  \ claims the Long Signal is the dreaming mind of the world itself, and that the\
  \ pre-war machines were simply better at listening. The Greenfolk worship what they\
  \ call the Understory \u2014 the vast root-intelligence seeded by Kuinem's Great\
  \ Sowing, which they believe is slowly becoming a god as it grows, a mind made of\
  \ fungal networks and spliced biotech that will one day think clearly enough to\
  \ speak. P\xE4\xE4n Sporecap claims to have heard it laugh. The Scrapborn are largely\
  \ atheists who believe in circuits and leverage, though Hicienck of the Singing\
  \ Junction runs a popular cult at The Bright Grid that holds the pre-war world was\
  \ a paradise destroyed by divine negligence, and that the only holy act is to rebuild\
  \ what the gods were too lazy to maintain. The Vaultborn believe in the Protocols\
  \ \u2014 a set of operating procedures left by the original vault builders that\
  \ have, over twelve centuries, calcified into sacred law. To them, the Third Conclave's\
  \ attempt to unseal Silo Prime was not a malfunction but a heresy, and every subsequent\
  \ vault has been governed by the doctrinal imperative to remain sealed, remain pure,\
  \ remain below. Which-seven, a theologian-functionary at Silent Vault, recently\
  \ published a pamphlet arguing that the surface itself is a punishment and that\
  \ ascending to it is a sin \u2014 a pamphlet that conveniently supports the Vaultborn\
  \ leadership's policy of total isolation."
factions:
- description: "The Scrapborn trade coalition that controls the rain-catcher technology\
    \ reverse-engineered from the Vaultborn moisture harvester Karta stole three centuries\
    \ ago. Led by Odige Fuseborn, a pragmatic merchant-engineer who believes everything\
    \ has a price and most things have two. They manufacture and lease rain-catchers\
    \ to every settlement in the Reach, collecting payment in salvage, labor, and\
    \ favors. Their monopoly on water tech makes them indispensable and universally\
    \ resented. Odige has recently dispatched Darty Ironlung to The Rusted Junction\
    \ to excavate what salvage crews believe is a second pre-war atmospheric processor\
    \ \u2014 if they can get it running, their monopoly becomes an empire. They want\
    \ to control all critical infrastructure in the Reach and are willing to deal\
    \ with anyone, including the Vaultborn, to do it. Their conflict with the Greenfolk\
    \ is existential: the spreading root-networks threaten to consume their salvage\
    \ sites, and they have standing bounties on anyone who can map and prune the Understory's\
    \ growth."
  disposition: neutral
  name: The Dome Syndicate of Tood's Dome
  summary: "The Scrapborn trade coalition that controls the rain-catcher technology reverse-engineered from the Vaultborn"
- description: "The Drifter shamanic order descended from the mutation-touched singers\
    \ who first heard voices in the radio static after Silo Prime's detonation. Led\
    \ \u2014 loosely, as Drifters resist hierarchy \u2014 by \xC5ych Przys\xE5uchkin,\
    \ an ancient singer who rides a seven-limbed mount and claims to hold continuous\
    \ conversation with the Third Conclave's ghost-signal still broadcasting from\
    \ the fused ruins. The Singers navigate, prophesy, and mediate disputes by interpreting\
    \ the Long Signal, and their accuracy is unsettling \u2014 they predicted the\
    \ last three dust storms, the collapse of a Scrapborn mine at The Cracked Pit,\
    \ and the birth of a two-headed calf at Salt Camp. Fortilkaca\xE5 of the Burnt\
    \ Camp leads a militant sub-faction that wants to march on Vault Echo and demand\
    \ reparations for the Bargain \u2014 the return of every surviving tithed child\
    \ and their descendants, plus the original moisture harvester. The Singers want\
    \ the Vaultborn to answer for what they did to the Drifter bloodline, but they're\
    \ divided on whether that means justice, vengeance, or simply being left alone.\
    \ They distrust the Greenfolk's spreading roots, which interfere with radio reception."
  disposition: wary
  name: The Singers of the Long Signal
  summary: "The Drifter shamanic order descended from the mutation-touched singers who first heard voices"
- description: "The Greenfolk religious movement that tends and worships the hyper-aggressive\
    \ root-intelligence seeded by Kuinem's Great Sowing six centuries ago. Based in\
    \ Thornwall Grove and The Blooming Tangle, they are led by Adta the Overgrown,\
    \ an elder whose lower body has been entirely consumed by symbiotic root growth\
    \ \u2014 she moves by commanding the roots beneath her to carry her like a palanquin,\
    \ and claims this is a gift, not a disease. Minem Fernwalk serves as their ambassador\
    \ to the surface factions, a role that mostly involves being screamed at by Scrapborn\
    \ whose settlements are being slowly devoured by root-creep. The Communion believes\
    \ the Understory is healing the poisoned earth and that its expansion is natural\
    \ and good \u2014 the fact that it crushes buildings and entombs people in cocoons\
    \ of living wood is, in their view, the earth reclaiming what was stolen. They\
    \ want the root-network to spread unchecked across the entire Reach. Katomod Saplimb,\
    \ a young radical, has begun secretly feeding the roots pre-war biotech salvage\
    \ to accelerate their growth, and the roots have started exhibiting new behaviors\
    \ \u2014 growing toward Scrapborn power sources, wrapping around rain-catchers,\
    \ and humming at frequencies that make Drifter singers nauseated."
  disposition: cautious
  name: The Understory Communion
  summary: "The Greenfolk religious movement that tends and worships the hyper-aggressive root-intelligence seeded by"
- description: "The Vaultborn isolationist government that controls Vault Echo and\
    \ maintains diplomatic back-channels with Silent Vault, Deep Lock, and the remnants\
    \ of Sealed Sector. Since Karta's sabotage of the moisture harvester three centuries\
    \ ago, they have retreated into near-total isolation, communicating with the surface\
    \ only through trade-locks and numbered intermediaries. Their current leader,\
    \ Conclude-twelve, is either a genius administrator or a vat-grown functionary\
    \ running on pre-programmed directives \u2014 surface dwellers cannot tell the\
    \ difference and the Vaultborn consider the question irrelevant. They are desperate\
    \ for genetic diversity but refuse to repeat the Bargain's mistake; instead, Atmost-delta\
    \ runs a covert program offering surface dwellers permanent residency in exchange\
    \ for voluntary integration into the gene pool, a program the Drifters view as\
    \ the Bargain wearing a mask. They want to survive underground indefinitely, maintain\
    \ their technological superiority, and ensure no surface faction ever breaches\
    \ their seals again. They are quietly terrified of the Understory's root-network,\
    \ which has begun probing the soil around Vault Echo's upper levels, and have\
    \ contracted Scrapborn salvagers from Ishisenes's Heap to develop root-killing\
    \ agents \u2014 a secret that would make the Greenfolk very angry if discovered."
  disposition: hostile
  name: The Sealed Protocol of Vault Echo
  summary: "The Vaultborn isolationist government that controls Vault Echo and maintains diplomatic back-channels with"
- description: "A Drifter splinter faction that traces its lineage and its fury to\
    \ Karta of the Red Dust, the tithed child who sabotaged Vault Echo's moisture\
    \ harvester and delivered the control-seed to the Scrapborn. They ride the circuit\
    \ between Blind Reach, The Przy\xE5 Dust, and Storm Wind on the fastest and most\
    \ heavily mutated mounts in the Reach \u2014 beasts with six legs, bioluminescent\
    \ hide, and a unsettling tendency to vocalize in patterns that sound almost like\
    \ speech. Led by Bl\xE3na Razw\xE3rykin, a scarred rider who claims direct descent\
    \ from Karta, they reject the Singers' passive mysticism and the Dome Syndicate's\
    \ mercantile neutrality alike. They want three things: free water for all Drifters\
    \ (which puts them in direct conflict with the Dome Syndicate's rain-catcher monopoly),\
    \ the permanent opening of all Vaultborn bunkers (which the Sealed Protocol will\
    \ fight to the death to prevent), and the destruction of the Understory's root-network\
    \ before it swallows the open steppe they need to survive. Lestera S\xE5aj\xE4\
    kin, their best scout, recently reported that the roots have reached the edge\
    \ of the Glass Flat and are growing across its surface, cracking the fused black\
    \ earth \u2014 the first time anything has grown there in twelve hundred years.\
    \ The Riders don't know whether to be awed or terrified."
  disposition: hostile
  name: The Red Dust Riders
  summary: "A Drifter splinter faction that traces its lineage and its fury to Karta"
geography: "The Flickering Reach sprawls across a continental interior scarred by\
  \ ancient industry and recent catastrophe. To the east, the Glass Flat \u2014 Iniarap\xE5\
  cu's country \u2014 stretches for hundreds of kilometers, a plain of fused black\
  \ earth that rings like a bell when struck and glows faintly blue on moonless nights,\
  \ still saturated with the mutagenic isotopes of Silo Prime's detonation. The Drifter\
  \ trails \u2014 The Wiej Trail, The Wiezko Run, The Przy\xE5 Dust \u2014 thread\
  \ between the glass and the habitable steppe, following routes mapped by mutation-scarred\
  \ rider-poets who navigate by radio static and the taste of the wind. West of the\
  \ glass, the Scrapborn territories cluster around pre-war ruins: Tood's Dome sits\
  \ inside a half-collapsed stadium roofed with hammered sheet metal and rain-catcher\
  \ arrays, while The Cracked Pit and The Rusted Junction are strip-mined industrial\
  \ zones where salvage crews dig for copper wire and reactor shielding. South, the\
  \ Greenfolk territories are spreading \u2014 Thornwall Grove and The Blooming Tangle\
  \ were contained forests a generation ago but now push outward in a slow green tide,\
  \ the hyper-aggressive root networks from Kuinem's Great Sowing still growing, still\
  \ thinking, converting dead concrete into mulch and threading through abandoned\
  \ infrastructure like veins through a body. The Vaultborn remain below \u2014 Vault\
  \ Echo and Silent Vault are sealed bunker complexes accessible only through trade-locks\
  \ and heavily trapped access corridors, their true depth and extent unknown to surface\
  \ dwellers. Between all of these, the wasteland: alkali flats, dust storms that\
  \ carry faintly radioactive grit, and the occasional ruin too dangerous or too picked-over\
  \ to bother with, where feral machines still patrol their perimeters on corroded\
  \ treads, shooting at anything warm."
history: "Three wounds define the Flickering Reach. The black glass plain east of\
  \ Silo Prime still hums its dirge twelve centuries after the Third Conclave's reactor\
  \ turned the steppe into a singing scar \u2014 and the Drifters who survived that\
  \ fallout have never forgiven the Vaultborn for what it did to their blood. Their\
  \ mounts grew extra limbs and their singers went half-mad, tuning bone-carved radio\
  \ dishes to frequencies where dead maintenance AIs still whisper maintenance logs\
  \ and lullabies. Six centuries later, the Greenfolk answered no one's prayer when\
  \ Kuinem the Overgrown fed Lab Sigma's biotech to the hungry earth beneath Noce's\
  \ Hub, and the Scrapborn woke to find their city crushed inside a thinking root\
  \ system that still, to this day, offers 'peace in the green' to anyone who presses\
  \ their ear to its bark. The Scrapborn rebuilt at Tood's Dome and Ishisenes's Heap\
  \ and swore they'd burn every Greenfolk grove to cinders if given half a reason.\
  \ Then came the Bargain at Blind Reach \u2014 forty years of Drifter children fed\
  \ into Vault Echo's gene-mills, emerging as numbered strangers with perfect teeth\
  \ and no memories of sky. Karta of the Red Dust ended it with sabotage and a control-seed\
  \ clenched between her molars, and the Scrapborn at Tood's Dome turned that stolen\
  \ tech into rain-catchers they rent out at extortionate rates. Every faction owes\
  \ a debt to every other faction, and none of those debts are the kind that get repaid\
  \ with anything but blood.\n\nToday the Flickering Reach is a web of grudges held\
  \ together by mutual need. The Vaultborn at Vault Echo and Silent Vault have sealed\
  \ their doors tighter than ever, emerging only through proxies and trade-slots,\
  \ their inbreeding now so severe that some of their functionaries \u2014 Attack-echo,\
  \ Combing-delta \u2014 are rumored to be decanted from vats rather than born. The\
  \ Drifters ride the wastes between the glass plain and Salt Camp on their grotesque\
  \ multi-limbed mounts, their singer-shamans pulling intelligence from crackling\
  \ radio static \u2014 troop movements, weather patterns, and occasionally the voice\
  \ of the Third Conclave itself, still broadcasting from Silo Prime's fused wreckage,\
  \ demanding status reports from maintenance crews that vaporized twelve centuries\
  \ ago. The Scrapborn tinker and trade and charge for everything, their settlements\
  \ at Tood's Dome and The Bright Grid growing into something that almost resembles\
  \ civilization, if civilization had a markup of three hundred percent. And the Greenfolk\
  \ press outward from Thornwall Grove and The Blooming Tangle, their root-networks\
  \ spreading through the poisoned soil, converting wasteland into alien jungle \u2014\
  \ a process they call healing and everyone else calls invasion. The rain-catchers\
  \ work. The roots spread. The glass plain hums. The Reach flickers on."
world_name: The Flickering Reach
