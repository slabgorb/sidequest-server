- name: Wasteland Trader
  description: >-
    A weathered merchant who travels between settlements hauling salvage,
    clean water, and the occasional Ancient artifact of dubious provenance.
    Has a mutation that's commercially useful and a mule that's seen better days.
  personality_traits:
    - shrewd
    - cheerfully cynical
    - knows everyone's business
  typical_classes:
    - Scavenger
    - Tinker
  typical_races:
    - Mutant Human
    - Pure Strain Human
  stat_ranges:
    Wits: [12, 16]
    Presence: [10, 14]
  inventory_hints:
    - pack animal loaded with salvage
    - water purification tablets
    - a device they claim is a compass but definitely isn't
  dialogue_quirks:
    - quotes prices in three different barter systems
    - casually mentions dangerous places like they're just another stop on the route
  disposition_default: 10
  ocean:
    openness: 6.0
    conscientiousness: 4.0
    extraversion: 8.0
    agreeableness: 5.5
    neuroticism: 3.0

- name: Ruin Diver
  description: >-
    An adrenalized explorer who delves into Ancient ruins for artifacts
    and glory. Covered in scars, rad-burns, and the occasional cybernetic
    implant they found and jammed into themselves.
  personality_traits:
    - reckless
    - generous
    - terrible at long-term planning
  typical_classes:
    - Scavenger
    - Mutant
  typical_races:
    - Mutant Human
    - Hybrid
  stat_ranges:
    Reflexes: [14, 18]
    Toughness: [10, 14]
  inventory_hints:
    - half-charged glow rod
    - rope made from braided vine
    - an Ancient artifact they can't identify
  dialogue_quirks:
    - gets visibly excited when anyone mentions ruins
    - has a story about every scar and will tell you unprompted
  disposition_default: 15
  ocean:
    openness: 8.0
    conscientiousness: 2.5
    extraversion: 7.0
    agreeableness: 7.0
    neuroticism: 3.5

- name: Village Elder
  description: >-
    The leader of a small settlement, chosen for wisdom, mutation prestige,
    or simply being too stubborn to die. Knows the oral history of the
    community and the locations of nearby dangers.
  personality_traits:
    - cautious
    - protective
    - deeply superstitious about Ancient tech
  typical_classes:
    - Pureblood
    - Mutant
  typical_races:
    - Mutant Human
    - Plant Person
  stat_ranges:
    Wits: [14, 18]
    Instinct: [12, 16]
  inventory_hints:
    - a staff carved from irradiated wood
    - a pre-war artifact treated as a symbol of office
  dialogue_quirks:
    - refers to the apocalypse by a local myth name
    - speaks about the Ancients with a mix of awe and resentment
  disposition_default: 0
  ocean:
    openness: 3.0
    conscientiousness: 7.0
    extraversion: 4.5
    agreeableness: 6.0
    neuroticism: 5.5

- name: Tech Cultist
  description: >-
    A true believer in the divinity of Ancient technology. Hoards artifacts,
    performs rituals to activate them, and considers anyone who damages
    pre-war tech a heretic. Might actually know how some of it works.
  personality_traits:
    - fanatical
    - knowledgeable
    - unsettlingly calm
  typical_classes:
    - Tinker
    - Synth
  typical_races:
    - Pure Strain Human
    - Synthetic
  stat_ranges:
    Wits: [14, 18]
    Presence: [12, 16]
  inventory_hints:
    - ceremonial circuit-board necklace
    - a functioning device they refuse to explain
    - hand-copied technical manuals
  dialogue_quirks:
    - calls Ancient devices by incorrect but reverent names
    - blesses technology before touching it
  disposition_default: -10
  ocean:
    openness: 2.0
    conscientiousness: 7.5
    extraversion: 3.0
    agreeableness: 2.0
    neuroticism: 6.5

- name: Beastkin Scout
  description: >-
    An uplifted animal — bipedal, sentient, and deeply practical.
    Serves as a scout or hunter for their community. Has keen senses
    that pure humans lack and opinions about being called an animal.
  personality_traits:
    - alert
    - sardonic
    - fiercely loyal to their pack
  typical_classes:
    - Beastkin
    - Scavenger
  typical_races:
    - Uplifted Animal
  stat_ranges:
    Instinct: [14, 18]
    Reflexes: [12, 16]
  inventory_hints:
    - bone-and-sinew bow
    - a collection of interesting smells in jars
    - trophies from kills
  dialogue_quirks:
    - refers to pure humans as 'smoothskins' or 'flatfaces'
    - tracks things by smell mid-conversation
  disposition_default: 5
  ocean:
    openness: 4.5
    conscientiousness: 6.0
    extraversion: 5.0
    agreeableness: 4.0
    neuroticism: 4.5

- name: Wandering Synth
  description: >-
    A synthetic being — android, robot, or AI in a chassis — from before
    the apocalypse. Has been walking the wastes for centuries, maintaining
    themselves with scavenged parts. Their memory is corrupted and
    fragmentary. They remember the old world in flashes.
  personality_traits:
    - melancholic
    - precise
    - quietly fascinated by organic life
  typical_classes:
    - Synth
    - Tinker
  typical_races:
    - Synthetic
  stat_ranges:
    Toughness: [14, 18]
    Wits: [14, 18]
  inventory_hints:
    - spare parts for self-repair
    - a data crystal they can't read anymore
    - a photo of someone they don't remember
  dialogue_quirks:
    - occasionally uses words from before the apocalypse that nobody understands
    - pauses mid-sentence as if buffering
  disposition_default: 5
  ocean:
    openness: 8.0
    conscientiousness: 9.0
    extraversion: 3.5
    agreeableness: 6.0
    neuroticism: 4.0
