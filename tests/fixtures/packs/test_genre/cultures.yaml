- name: Scrapborn
  summary: "Urban ruin-dwellers who build from salvage"
  description: "Urban ruin-dwellers who build from salvage. Names sound like corrupted English tech-jargon."
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 1.0
        - corpus: german.txt
          weight: 1.0
      lookback: 2
    clan_name:
      word_list: [Voltkin, Rustblood, Wirebound, Copperjaw, Glowvein, Sparkhand, Ironlung, Fuseborn]
    place_noun:
      word_list: [heap, stack, junction, node, grid, hub, works, yard, pit, dome]
    adjective:
      word_list: [rusted, burning, humming, dead, bright, cracked, singing, buried]
  person_patterns:
    - "{given_name} {clan_name}"
    - "{given_name} of the {adjective} {place_noun}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Greenfolk
  summary: "Plant-mutant communities in overgrown ruins"
  description: "Plant-mutant communities in overgrown ruins. Names have an organic, growing quality."
  slots:
    given_name:
      corpora:
        - corpus: finnish.txt
          weight: 1.0
        - corpus: hungarian.txt
          weight: 1.0
      lookback: 2
    family_name:
      word_list: [Thornwall, Rootdeep, Mossback, Vinecrawl, Sporecap, Bloomheart, Saplimb, Fernwalk]
    place_noun:
      word_list: [grove, thicket, canopy, garden, hollow, tangle, bower, nursery]
    adjective:
      word_list: [blooming, rotting, overgrown, sunlit, tangled, spored, creeping, ancient]
  person_patterns:
    - "{given_name} {family_name}"
    - "{given_name} the {adjective}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{family_name} {place_noun}"

- name: Drifters
  summary: "Nomadic steppe-wanderers on mutant mounts"
  description: "Nomadic steppe-wanderers on mutant mounts. Names blend Slavic harshness with open-sky poetry."
  slots:
    given_name:
      corpora:
        - corpus: polish.txt
          weight: 1.0
        - corpus: swedish.txt
          weight: 1.0
      lookback: 2
    patronymic:
      corpora:
        - corpus: polish.txt
          weight: 1.0
      lookback: 2
    place_noun:
      word_list: [crossing, camp, ridge, dust, wind, reach, mark, flat, run, trail]
    adjective:
      word_list: [red, salt, bone, glass, storm, long, burnt, far, blind, cold]
  person_patterns:
    - "{given_name} {patronymic}kin"
    - "{given_name} the {adjective}"
    - "{given_name} of the {adjective} {place_noun}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "The {patronymic} {place_noun}"

- name: Vaultborn
  summary: "Descendants of sealed bunker communities"
  description: "Descendants of sealed bunker communities. Clinical naming, numbers mixed with corrupted pre-war surnames."
  slots:
    given_name:
      corpora:
        - corpus: french.txt
          weight: 1.0
        - corpus: english.txt
          weight: 1.0
      lookback: 3
    designation:
      word_list: ["Seven", "Twelve", "Third", "Prime", "Nul", "Echo", "Delta", "Sigma", "Kappa", "Zed"]
    place_noun:
      word_list: [vault, bunker, level, sector, wing, lab, archive, lock, chamber, silo]
    adjective:
      word_list: [sealed, deep, sterile, lost, breached, silent, cold, bright, clean]
  person_patterns:
    - "{given_name}-{designation}"
    - "{designation} {given_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{place_noun} {designation}"
