- id: origins
  title: "Where You Woke Up"
  narration: >-
    The world ended a long time ago. Nobody agrees on when or how — the
    stories change with every settlement. What matters is what came after.
    You survived. You always survive. But where did you come from?
  loading_text: "The wasteland remembers your answer..."
  allows_freeform: true
  choices:
    - label: "The Heaps"
      description: "A city built from stacked ruins, where everything is salvage and everyone has a price."
      mechanical_effects:
        class_hint: Scavenger
        race_hint: Mutant Human
        background: Heap Rat
    - label: "The Overgrowth"
      description: "A forest that swallowed a city, where plant-folk tend the green and distrust outsiders."
      mechanical_effects:
        class_hint: Mutant
        race_hint: Plant Person
        background: Overgrowth Tender
    - label: "The Open Dust"
      description: "Endless wastes between settlements, where nomad clans ride mutant beasts and follow the rain."
      mechanical_effects:
        class_hint: Beastkin
        race_hint: Uplifted Animal
        background: Dust Nomad
    - label: "A Sealed Vault"
      description: "Recently breached — sterile corridors, recycled air, and a door that finally opened."
      mechanical_effects:
        class_hint: Pureblood
        race_hint: Pure Strain Human
        background: Vault Dweller
    - label: "A Ruin You Don't Remember"
      description: "You woke up on a metal slab with gaps in your memory and parts that aren't organic."
      mechanical_effects:
        class_hint: Synth
        race_hint: Synthetic
        background: Memory Fragment

- id: pronouns
  title: "Who Are You?"
  narration: >-
    Before we go further — the wasteland doesn't care what you were
    before. It only cares what you are now. How do others talk about
    you when you're not around?
  allows_freeform: true
  choices:
    - label: "she/her"
      description: "She walks the dust on her own terms."
      mechanical_effects:
        pronoun_hint: "she/her"
    - label: "he/him"
      description: "He carves his own path through the ruins."
      mechanical_effects:
        pronoun_hint: "he/him"
    - label: "they/them"
      description: "They answer to no one's expectations."
      mechanical_effects:
        pronoun_hint: "they/them"

- id: mutation
  title: "What Makes You Different"
  narration: >-
    In the wasteland, nobody looks the same. Radiation, bio-agents, and
    centuries of adaptation have made sure of that. Some changes are
    subtle — an extra sense, a resistance to poison. Others are obvious.
    What did the wasteland give you?
  choices:
    - label: "Extra Limbs"
      description: "A third arm, useful for carrying things and unsettling handshakes."
      mechanical_effects:
        mutation_hint: extra_limbs
        personality_trait: Resourceful
    - label: "Bioluminescence"
      description: "Your skin glows faintly in the dark. You are your own lantern and everyone's target."
      mechanical_effects:
        mutation_hint: bioluminescence
        personality_trait: Cautious
    - label: "Chitinous Plates"
      description: "Patches of natural armor that itch when it rains."
      mechanical_effects:
        mutation_hint: natural_armor
        personality_trait: Tough
    - label: "Psychic Static"
      description: "You hear whispers from nearby minds. Most of it is useless noise."
      mechanical_effects:
        mutation_hint: psychic
        personality_trait: Perceptive
    - label: "Regeneration"
      description: "You heal fast, but it hurts, and sometimes things grow back wrong."
      mechanical_effects:
        mutation_hint: regeneration
        personality_trait: Reckless
    - label: "Nothing Visible"
      description: "You pass for normal. In the wasteland, that's its own kind of mutation."
      mechanical_effects:
        mutation_hint: none
        personality_trait: Adaptable

- id: artifact
  title: "The Thing You Found"
  narration: >-
    Everyone in the wasteland has a story about the one thing they found
    that changed everything. The artifact you carry — you don't fully
    understand it. Nobody does. But it does something, and that makes
    it valuable. Or dangerous. Usually both.
  choices:
    - label: "Growth Wand"
      description: "A humming metal rod that makes plants grow faster when you point it at them. The plants don't always grow right."
      mechanical_effects:
        item_hint: growth_wand
    - label: "Ancient Screen"
      description: "A flat glass rectangle that sometimes shows pictures of the old world. You can't control what it shows."
      mechanical_effects:
        item_hint: datapad
    - label: "Screaming Purifier"
      description: "A small box that purifies any liquid poured into it. The catch: it takes a day, and it screams while working."
      mechanical_effects:
        item_hint: purifier
    - label: "Power Glove"
      description: "A glove that makes your hand incredibly strong but only for about ten seconds. Then it needs to rest for an hour."
      mechanical_effects:
        item_hint: power_glove
    - label: "Mystery Compass"
      description: "A compass that doesn't point north. It points at something, but you haven't figured out what yet."
      mechanical_effects:
        item_hint: mystery_compass
    - label: "Nothing"
      description: "You've survived on wits and grit alone. Artifacts are for people who trust things they don't understand."
      mechanical_effects:
        item_hint: ~

- id: confirmation
  title: "The Wasteland Awaits"
  narration: >-
    You stand at the edge of the known. Behind you, whatever passed for
    home. Ahead, the wasteland — vast, strange, and full of things that
    want to eat you, trade with you, or show you something impossible.
    You've got your mutations, your wits, and maybe a piece of Ancient
    tech that might save your life or end it spectacularly.
    The road waits.
  choices: []
