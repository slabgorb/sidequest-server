world_name: ""
history: >-
  The world ended. What came after is stranger than what came before.
  Mutations reshaped life. Ancient technology lies scattered in ruins.
  New cultures rose from the ashes, building on fragments of what was lost.
geography: ""
cosmology: >-
  The Ancients built wonders and destroyed themselves. Their technology
  endures — broken, dangerous, occasionally miraculous. Whether gods
  exist is less interesting than whether the reactor under the mountain
  still works.
