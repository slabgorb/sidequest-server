tone: gonzo-sincere
lethality: moderate
magic_level: none

stat_generation: point_buy
point_buy_budget: 27

ability_score_names:
  - Brawn
  - Reflexes
  - Toughness
  - Wits
  - Instinct
  - Presence

allowed_classes:
  - Scavenger
  - Mutant
  - Pureblood
  - Synth
  - Beastkin
  - Tinker

allowed_races:
  - Mutant Human
  - Pure Strain Human
  - Uplifted Animal
  - Plant Person
  - Synthetic
  - Hybrid

race_label: Stock
class_label: Calling


# ── Confrontations (dual-track momentum, spec 2026-04-25) ────────────────────
confrontations:
  - type: negotiation
    label: "Wasteland Parley"
    category: social
    player_metric:
      name: leverage
      starting: 0
      threshold: 10
    opponent_metric:
      name: leverage
      starting: 0
      threshold: 10
    beats:
      - id: persuade
        label: "Make Your Case"
        kind: strike
        base: 2
        stat_check: Presence
        effect: "opponent considers your argument"
        narrator_hint: "Show the NPC weighing the player's words."
      - id: threaten
        label: "Threaten"
        kind: strike
        base: 3
        stat_check: Brawn
        risk: "faction reputation -1 if it fails"
        consequence: "NPC becomes hostile on critical failure"
        narrator_hint: "Escalate tension. The threat should feel dangerous."
      - id: concede_point
        label: "Concede a Point"
        kind: brace
        base: 1
        stat_check: Presence
        effect: "opponent disposition +5, reveals their real goal"
        narrator_hint: "Strategic retreat. Player gives ground to gain information."
      - id: walk_away
        label: "Walk Away"
        kind: push
        base: 1
        stat_check: Instinct
        resolution: true
        consequence: "deal collapses, reputation intact"
        narrator_hint: "Player turns their back on the deal. Walking away."
    mood: tension

  - type: combat
    label: "Wasteland Brawl"
    category: combat
    # Momentum-based dual-dial encounter — each side has an independent
    # ascending dial. First side to reach threshold wins.
    player_metric:
      name: momentum
      starting: 0
      threshold: 10
    opponent_metric:
      name: momentum
      starting: 0
      threshold: 10
    beats:
      - id: attack
        label: "Attack"
        kind: strike
        base: 2
        stat_check: Brawn
        effect: "deal damage to the target"
        narrator_hint: "Describe the blow connecting — gritty, physical, consequential."
      - id: defend
        label: "Defend"
        kind: brace
        base: 1
        stat_check: Toughness
        effect: "reduce incoming damage, hold position"
        narrator_hint: "Player braces or blocks. Show the impact absorbed."
      - id: flank
        label: "Flank"
        kind: strike
        base: 3
        stat_check: Reflexes
        risk: "exposed if it fails"
        narrator_hint: "Risky repositioning for a better angle of attack."
      - id: mutant_ability
        label: "Use Mutation"
        kind: strike
        base: 4
        stat_check: Instinct
        risk: "mutation instability on failure"
        narrator_hint: "The mutation manifests visibly. Show the cost as well as the power."
      - id: flee
        label: "Flee"
        kind: push
        base: 1
        stat_check: Reflexes
        resolution: true
        consequence: "escape combat, possible pursuit"
        narrator_hint: "Player breaks contact and runs. Not every fight needs a winner."
    mood: combat

  - type: chase
    label: Wasteland Pursuit
    category: movement
    player_metric:
      name: separation
      starting: 0
      threshold: 10
    opponent_metric:
      name: separation
      starting: 0
      threshold: 10
    beats:
      - id: scramble
        label: Scramble
        kind: strike
        base: 2
        stat_check: Reflexes
        narrator_hint: Boots on dust, pickup tires spitting rocks.
      - id: shortcut
        label: Shortcut
        kind: strike
        base: 3
        stat_check: Wits
        risk: "Dead end in the rubble"
      - id: distraction
        label: Distraction
        kind: angle
        base: 1
        stat_check: Wits
        target_tag: "Off-Balance"
        effect: "Throw a flare, scatter scrap, misdirect"
      - id: go_underground
        label: Go Underground
        kind: push
        base: 1
        stat_check: Reflexes
        resolution: true
        consequence: "Chase ends — vanish into a drainage tunnel or bunker"
    mood: tension
