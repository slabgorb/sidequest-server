definitions:
  - id: weirdness
    name: Weirdness
    description: >-
      How strange and gonzo the world gets. Low weirdness is grounded
      post-apocalypse — survival, scarcity, pragmatic people. High weirdness
      means sentient cacti, singing radiation zones, and a village ruled
      by a council of psychic frogs.
    poles:
      - grounded
      - gonzo
    default: 0.6

  - id: tech_level
    name: Tech Level
    description: >-
      How much Ancient tech is around and how well it works. Low tech means
      most artifacts are broken, dangerous, or poorly understood. High tech
      means working devices are more common and people have learned to
      maintain some of it.
    poles:
      - scrapyard
      - functional
    default: 0.4

  - id: hope
    name: Hope
    description: >-
      Is the world recovering or declining? Low hope means resources are
      dwindling, mutations are getting worse, and the wasteland is winning.
      High hope means communities are growing, people are learning, and
      the world is slowly healing.
    poles:
      - declining
      - recovering
    default: 0.5

modifiers:
  weirdness:
    grounded: >-
      Keep the post-apocalypse relatively realistic. Mutations are biological,
      not magical. Technology follows physical laws even if characters don't
      understand them. The world is harsh but comprehensible.
    gonzo: >-
      Embrace the weird. Mutations can be bizarre and wonderful. Technology
      can do things that seem like magic. The world has pockets of genuine
      impossibility — places where the rules broke during the apocalypse
      and never got fixed.

  tech_level:
    scrapyard: >-
      Working Ancient tech is incredibly rare and precious. Most artifacts
      are broken, corroded, or out of power. People who can identify what
      something used to be are valued. Activating anything is a major event.
    functional: >-
      Some communities have figured out how to maintain Ancient tech. Power
      sources exist. Devices can be recharged. The knowledge gap is closing,
      but unevenly — some settlements have lights and clean water while
      others still live in the dark.

  hope:
    declining: >-
      The world is getting worse. Rad storms are more frequent. Mutations
      are more severe. Clean water is harder to find. Communities are
      shrinking. The wasteland is reclaiming what people built.
    recovering: >-
      There are signs of recovery. New crops grow in reclaimed soil. Trade
      routes are safer than they were a generation ago. Children are born
      with fewer mutations. People talk about the future as if it might
      actually arrive.

presets:
  - name: Caves of Qud
    description: >-
      Maximum weirdness, moderate tech, cautiously hopeful. Sentient fungi,
      psychic powers, and deep ruins full of working Ancient machines.
      The world is strange but thriving in its strangeness.
    values:
      weirdness: 0.9
      tech_level: 0.5
      hope: 0.6

  - name: Fallout
    description: >-
      Moderate weirdness, moderate tech, ambiguous hope. Vault dwellers,
      power armor, bottle caps as currency. The old world's echoes are
      everywhere. Darkly funny but genuinely dangerous.
    values:
      weirdness: 0.5
      tech_level: 0.6
      hope: 0.4

  - name: The Road
    description: >-
      Minimal weirdness, almost no tech, nearly hopeless. Ash and silence.
      Every calorie counts. Trust is the rarest resource. Not recommended
      for fun game sessions.
    values:
      weirdness: 0.1
      tech_level: 0.1
      hope: 0.15

  - name: Gamma World Classic
    description: >-
      High weirdness, moderate tech, surprisingly optimistic. Mutant rabbits
      with laser eyes, sentient AI running a shopping mall, and a village
      that worships a vending machine. Embrace the gonzo.
    values:
      weirdness: 0.85
      tech_level: 0.5
      hope: 0.65
