# Visual style configuration for mutant wasteland genre pack
#
# Controls how Flux image generation renders scenes for this genre.
# Mutant wasteland visual identity: gritty digital painting with
# painterly texture. Overgrown ruins reclaimed by mutated flora,
# rusted Pre-War technology half-buried in irradiated soil. Skies
# bruised with perpetual haze — amber, toxic green, deep violet.
# Bioluminescent growths provide eerie color against desaturated
# earth tones. Figures are weathered, scarred, improvised gear
# cobbled from salvage. The world feels heavy, tactile, and lived-in.

# ── Core Style ────────────────────────────────────────────────

positive_suffix: >-
  post-apocalyptic digital painting, gritty painterly texture,
  desaturated earth tones with bioluminescent accent color,
  bruised amber and toxic green sky, weathered surfaces and rust,
  overgrown ruins, visible brush strokes, environmental storytelling,
  cinematic composition, dramatic volumetric light through haze,
  scavenger wardrobe and salvaged gear only — layered rags, leather,
  canvas, cobbled armor, goggles, respirators. Fake weathered stencil
  markings and faded graffiti are allowed as in-world ruin texture.
  No watermark, no artist signature, no concept-art credit, no studio
  logo, no UI overlay, no game HUD, no health bar, no title card, no
  border, no frame.

# Z-Image Turbo ignores negative_prompt at guidance_scale=0. All
# constraints live in positive_suffix. See PROMPTING_Z_IMAGE.md.
negative_prompt: ""

preferred_model: dev

base_seed: 42

# ── Location Tag Overrides ────────────────────────────────────
# Substring-matched against location names from the narrator.
# With 512 token budget we can be descriptive — paint the scene.

visual_tag_overrides:
  wasteland: >-
    cracked sun-baked earth stretching to the horizon, skeletal
    remains of highway overpasses, dust devils, distant irradiated
    storm wall glowing sickly green, bleached bones and rusted car husks
  settlement: >-
    ramshackle shelters built from corrugated metal and tarpaulin,
    water collectors, guard towers cobbled from highway signs,
    cooking fires in oil drums, razor wire perimeter
  bunker: >-
    reinforced concrete blast doors, flickering fluorescent tubes,
    Pre-War military signage, supply crates, stale air and dust,
    cracked linoleum floors, radiation warning symbols
  ruins: >-
    collapsed concrete buildings draped in mutant kudzu vine,
    shattered windows, tilted floors, feral growths pushing through
    cracks, scavenged interiors stripped to rebar and wire
  market: >-
    trading post under a rusted highway overpass, salvage spread
    on blankets, barter goods in labeled crates, armed guards,
    generator-powered string lights, smoke from a grill
  forest: >-
    mutant forest of twisted bioluminescent trees, glowing fungal
    shelves on bark, iridescent moss carpeting the ground, thick
    canopy filtering sickly green light, strange insect silhouettes
  swamp: >-
    irradiated marshland, bubbling toxic pools with oily rainbow
    sheen, gnarled dead trees draped in luminous algae strands,
    half-submerged rusted vehicles, thick yellow fog
  cave: >-
    deep cavern with bioluminescent crystal formations, dripping
    radioactive condensation, old mine cart tracks, collapsed
    tunnel supports, faint Geiger crackle ambience
  camp: >-
    survivor camp around a barrel fire, bedrolls on salvaged
    mattresses, weapons propped against concrete blocks, lookout
    on a rusted water tower, stars through irradiated haze
  road: >-
    cracked two-lane highway with weeds breaking through, faded
    lane markings, overturned vehicles pushed to shoulders, distant
    settlement smoke, power lines sagging between leaning poles
  lab: >-
    ransacked Pre-War research laboratory, shattered glass tanks,
    dried chemical stains, overturned equipment, emergency lighting
    casting red shadows, mutant specimens in cracked jars
  tower: >-
    repurposed radio tower or water tower, jury-rigged antenna
    arrays, lookout platform with scavenged optics, wind-battered
    guy wires, panoramic wasteland view
  river: >-
    sluggish irradiated river with discolored water, rusted bridge
    pylons, debris caught against supports, reeds with strange
    bioluminescent tips, muddy banks with animal tracks
  arena: >-
    fighting pit carved from a collapsed parking structure, tiered
    spectator seats on concrete slabs, bloodstains, crude weapons
    rack, roaring crowd silhouettes, torch and floodlight

