# Audio configuration for mutant wasteland genre pack
# Mood tracks, SFX library, creature voice presets, mixer settings

mood_tracks:
  exploration:
    - path: audio/music/exploration.ogg
      title: "Wasteland Horizon"
      bpm: 90
    - path: audio/music/exploration_3.ogg
      title: "Dust and Distance"
      bpm: 85
  combat:
    - path: audio/music/combat.ogg
      title: "Scrap Iron Fury"
      bpm: 140
    - path: audio/music/combat_3.ogg
      title: "Kill or Be Killed"
      bpm: 150
  tension:
    - path: audio/music/tension.ogg
      title: "Geiger Whisper"
      bpm: 70
    - path: audio/music/tension_3.ogg
      title: "Dead Zone"
      bpm: 60
  settlement:
    - path: audio/music/settlement.ogg
      title: "Junkyard Hearth"
      bpm: 100
    - path: audio/music/settlement_3.ogg
      title: "Found Family"
      bpm: 95
  mystery:
    - path: audio/music/mystery.ogg
      title: "Ancient Signal"
      bpm: 75
    - path: audio/music/mystery_3.ogg
      title: "Glitching Beacon"
      bpm: 80
  ruins:
    - path: audio/music/ruins.ogg
      title: "Echoes of Before"
      bpm: 55
  rest:
    - path: audio/music/rest.ogg
      title: "Starlight on Ash"
      bpm: 65

sfx_library:
  # Combat (Kenney CC0 + sci-fi)
  explosion:
    - audio/sfx/explosion.ogg
    - audio/sfx/explosion_2.ogg
    - audio/sfx/explosion_3.ogg
  explosion_heavy:
    - audio/sfx/explosion_heavy.ogg
    - audio/sfx/explosion_heavy_2.ogg
  metal_impact:
    - audio/sfx/metal_impact.ogg
    - audio/sfx/metal_impact_2.ogg
    - audio/sfx/metal_impact_3.ogg
  metal_clang:
    - audio/sfx/metal_clang.ogg
    - audio/sfx/metal_clang_2.ogg
  metal_hit:
    - audio/sfx/metal_hit.ogg
    - audio/sfx/metal_hit_2.ogg
  punch:
    - audio/sfx/punch.ogg
    - audio/sfx/punch_2.ogg
    - audio/sfx/punch_3.ogg
  hit:
    - audio/sfx/hit.ogg
    - audio/sfx/hit_2.ogg
  blade_slash:
    - audio/sfx/blade_slash.ogg
    - audio/sfx/blade_slash_2.ogg
  draw_blade:
    - audio/sfx/draw_blade.ogg
    - audio/sfx/draw_blade_2.ogg
  # Energy weapons
  energy_weapon:
    - audio/sfx/energy_weapon.ogg
    - audio/sfx/energy_weapon_2.ogg
  energy_pistol:
    - audio/sfx/energy_pistol.ogg
    - audio/sfx/energy_pistol_2.ogg
  zap:
    - audio/sfx/zap.ogg
    - audio/sfx/zap_2.ogg
  # Mutation / radiation
  energy_field:
    - audio/sfx/energy_field.ogg
    - audio/sfx/energy_field_2.ogg
    - audio/sfx/energy_pulse.ogg
  mutant_ooze:
    - audio/sfx/mutant_ooze.ogg
    - audio/sfx/mutant_ooze_2.ogg
  # Tech / scavenging
  computer_noise:
    - audio/sfx/computer_noise.ogg
    - audio/sfx/computer_noise_2.ogg
    - audio/sfx/computer_beep.ogg
  scavenge:
    - audio/sfx/scavenge.ogg
    - audio/sfx/scavenge_2.ogg
    - audio/sfx/scavenge_3.ogg
  tin_rattle:
    - audio/sfx/tin_rattle.ogg
    - audio/sfx/tin_rattle_2.ogg
  # Environment
  door_open:
    - audio/sfx/door_open.ogg
    - audio/sfx/door_open_2.ogg
  door_close:
    - audio/sfx/door_close.ogg
    - audio/sfx/door_close_2.ogg
  latch_open:
    - audio/sfx/latch_open.ogg
  metal_click:
    - audio/sfx/metal_click.ogg
  # Movement
  footsteps:
    - audio/sfx/footsteps.ogg
    - audio/sfx/footsteps_2.ogg
    - audio/sfx/footsteps_3.ogg
    - audio/sfx/footsteps_4.ogg
    - audio/sfx/footsteps_5.ogg
  # Vehicle
  thruster:
    - audio/sfx/thruster.ogg
    - audio/sfx/thruster_2.ogg
  machinery_hum:
    - audio/sfx/machinery_hum.ogg
    - audio/sfx/machinery_hum_2.ogg

mixer:
  music_volume: 0.4
  sfx_volume: 0.7
  crossfade_default_ms: 3000

