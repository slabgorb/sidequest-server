affinities:
  - name: "Flux"
    description: "Mutation control, biological adaptation, the body rewriting itself"
    triggers:
      - "using a mutation deliberately"
      - "pushing a mutation beyond its normal limits"
      - "adapting physically to a hostile environment"
      - "surviving radiation or bio-contamination"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Shifting"
        description: "Your body has started to change on purpose, not just by accident. You can feel it deciding what to become."
        abilities:
          - name: "Forced Growth"
            experience: >
              It starts as an itch deep under the skin, in the muscle, in the bone. You
              lean into it and the flesh answers — a chitinous ridge hardens along your
              forearm, or your fingers extend an extra knuckle, or the bioluminescence
              flares bright enough to read by. The sensation is like cracking a joint
              that's been stiff for years: awful and satisfying in equal measure. Your
              body remembers shapes it hasn't worn yet, and you're learning to ask for them.
            limits: >
              Growth that isn't guided goes wrong. Push too hard and the new tissue comes
              in crooked — bone spurs at bad angles, skin that splits before it toughens,
              growths that press on nerves and leave your hand tingling for days. The body
              has its own ideas about what to become, and they don't always match yours.
          - name: "Metabolic Surge"
            experience: >
              You flip a switch somewhere behind your stomach and everything accelerates.
              Wounds close while you watch, bruises yellowing in minutes instead of days.
              Your temperature spikes and your vision sharpens and the world gets slow
              and bright. It feels like burning clean — every cell dumping its reserves
              at once, converting fat and glycogen into raw, reckless repair.
            limits: >
              The crash is immediate and absolute. When the surge fades, you're shaking,
              hollow, starving. Your body burned a week's calories in minutes. Eat
              everything in reach or pass out — those are the options. Surge twice in a
              day and your organs start cannibalizing themselves for fuel.
          - name: "Mutation Read"
            experience: >
              You look at another mutant and you just — know. The way their skin sits,
              the rhythm of their breathing, the particular sheen on their scales or the
              pulse in their bioluminescence tells you what their body can do. It's like
              recognizing a dialect. You feel the kinship in your own flesh, a sympathetic
              twitch where your mutation mirrors theirs. Not mind-reading. Body-reading.
            limits: >
              Synths and purebloods are blank pages. No mutations, no signal, nothing to
              read. And heavily mutated creatures — the ones that have gone feral, the
              ones that stopped being anything recognizable — broadcast so much noise
              that reading them is like staring at the sun. You get impressions, not facts.
      tier_2:
        name: "Adapted"
        description: "The mutations aren't happening to you anymore. You're happening to them."
        abilities:
          - name: "Selective Shift"
            experience: >
              You concentrate and the change comes where you want it. Thicker skin on the
              palms before climbing irradiated rubble. Denser bone in the fists before a
              fight. Wider pupils in the dark. The body reshapes itself like wet clay under
              a sculptor's thumb, and the sculptor is you. There's a conversation between
              your will and your cells, and they've learned to listen. The reshaping ripples
              outward from the point of focus, flesh reorganizing with a sound like knuckles
              cracking in sequence.
            limits: >
              Every shift borrows from somewhere else. Thicken your skin and your joints
              stiffen. Strengthen your arms and your legs get shaky. The body has a fixed
              budget of material, and robbing one account to fund another leaves deficits
              that take days to rebalance. Shift too many times without rest and the body
              stops listening — it locks into whatever shape it was last told, and getting
              it to move again takes time you might not have.
          - name: "Toxin Flush"
            experience: >
              The poison hits your bloodstream and your body says no. You feel it — a wave
              of heat starting at the wound site, spreading outward, cooking the venom as
              it goes. Your sweat turns acrid and your pores weep something that smells like
              burnt copper. The contamination pushes outward through your skin in visible
              beads, dark and wrong-looking, and then it's gone and you're left shaking
              and clean. The relief is physical, like surfacing after too long underwater.
            limits: >
              Radiation is harder. Chemical toxins flush in minutes, but rads accumulate
              in bone and marrow where the flush can't reach. Push the flush too hard
              against heavy contamination and your body overheats — fever, seizures, the
              smell of your own cells burning. Some poisons are too integrated to expel.
              By the time you feel them, they're already part of you.
          - name: "Sympathetic Mutation"
            experience: >
              You touch another mutant and something passes between you — not disease, not
              contagion, but information. Your body reads their adaptation and borrows the
              blueprint. For a few hours, their mutation is yours: their acid resistance,
              their thermal regulation, their echolocation. It grows in fast and unstable,
              a rough copy of years of evolution crammed into minutes. The borrowed shape
              feels alien and intimate at the same time, like wearing someone else's skin
              from the inside.
            limits: >
              Borrowed mutations are unstable. They degrade — the acid resistance thins,
              the echolocation blurs, the thermal regulation drifts. Use one hard and it
              burns out in minutes instead of hours. And there's bleedback: borrow too
              often from the same person and your own mutations start drifting toward
              theirs, permanently. Some mutants won't let you touch them for exactly
              this reason.
      tier_3:
        name: "Apex Strain"
        description: "You're not mutating anymore. You're evolving. Deliberately, consciously, and the wasteland can feel it."
        abilities:
          - name: "Full Metamorphosis"
            experience: >
              You close your eyes and let go of the shape you've been holding. The body
              dissolves its own architecture — bones soften, muscles unknit, skin flows
              like heated wax — and rebuilds from the ground up. Wings. Armor plating. A
              second spine for quadrupedal speed. The pain is enormous and distant, like
              thunder from the next valley. When it's done, you stand in a body that didn't
              exist five minutes ago, built for exactly this moment. The old shape is a
              memory your cells haven't forgotten. You can always go back. Probably.
            limits: >
              Every metamorphosis is a gamble. The body doesn't always return to baseline
              cleanly — asymmetries accumulate, organs shift position, old injuries resurface
              in new locations. After enough transformations, the resting shape starts to
              drift, and the face in the reflection gets harder to recognize. Some apex
              mutants forget what they looked like originally. Some can't go back at all.
          - name: "Mutation Suppression"
            experience: >
              You reach out — not with your hands but with the field your body generates,
              the thing that makes animals nervous and compasses spin — and you press down
              on another mutant's flux. Their mutation stutters. The bioluminescence dims.
              The bone spurs retract. The acid glands seal shut. You feel their body fighting
              you, cells screaming to express what they've become, and you hold them still.
              It's like gripping a live wire that doesn't want to stop conducting.
            limits: >
              Suppression requires sustained concentration and proximity. Break eye contact
              or get hit and the field collapses, and their mutation snaps back with
              rebound force — usually stronger than before. Use it on a feral mutant and
              the suppression might be the only thing keeping them from going critical.
              Release it wrong and the mutation explodes outward in ways nobody predicted.
          - name: "Evolutionary Beacon"
            experience: >
              Your body emits something — not light, not sound, but a signal that other
              mutants feel in their marrow. A resonance. The mutations around you respond:
              dormant genes activate, stalled adaptations lurch forward, the slow machinery
              of evolution accelerates in your proximity. Plants lean toward you. Insects
              swarm. Other mutants' bioluminescence flares in sympathetic patterns they
              can't control. You are a catalyst, and the wasteland's biology has started
              treating you as a template for what comes next.
            limits: >
              The beacon isn't selective. Everything in range mutates faster — including
              things that shouldn't. Tumors accelerate. Parasites adapt. Feral mutants
              in your proximity go critical faster. And the signal draws attention from
              things that hunt by sensing mutation flux — predators with no eyes that
              track the evolutionary pulse like sharks track blood in water. Being a
              beacon means never being hidden.

  - name: "Salvage"
    description: "Ancient technology, mechanical intuition, the art of making dead things work"
    triggers:
      - "repairing or activating pre-war technology"
      - "jury-rigging a solution from scrap"
      - "identifying Ancient artifacts"
      - "building or modifying equipment"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Scrapper"
        description: "You've learned to see value in junk. Everything is parts, and parts are survival."
        abilities:
          - name: "Jury-Rig"
            experience: >
              Wire, tape, spit, and desperation. You look at the broken thing and the fix
              assembles itself in your head — not the right fix, not the elegant fix, but
              the fix that works with what's in your pockets. A capacitor from a dead radio
              bridges the gap in a water purifier. A car spring becomes a trigger mechanism.
              Your hands move fast because they've learned that perfect is the enemy of
              functional, and functional keeps you alive. The repair holds together with the
              mechanical equivalent of willpower.
            limits: >
              Jury-rigs fail. Not if, when. The question is whether it lasts long enough
              to matter. Every kludge introduces a new failure point, and kludges on top
              of kludges create cascading breakdowns that take the whole assembly down at
              once. You can feel the fragility in the thing you've built — it works, but
              it works resentfully.
          - name: "Scrap Sense"
            experience: >
              You walk through a ruin and your eyes sort the debris automatically — useful,
              useless, dangerous. That corroded lump is a pre-war battery with a viable
              cell. Those bent rods are titanium alloy worth their weight in clean water.
              The green circuit board is trash, but the capacitors on it are gold. Your
              fingers know materials by touch: the weight of copper, the grain of aluminum,
              the particular coldness of military-grade steel. The wasteland is a junkyard,
              and you read it like a menu.
            limits: >
              Familiarity breeds assumptions. You see salvage value and miss danger — the
              battery that's viable but also volatile, the alloy that's been irradiated,
              the military steel that's attached to an unexploded ordnance. Grab first and
              assess later gets hands blown off in Ancient armories.
          - name: "Field Strip"
            experience: >
              Your fingers find the seams. Every machine has an order it wants to come apart
              in, and you've learned to feel for it — the screws that give first, the clips
              that release with a half-turn, the casing that slides when you push just here.
              Components emerge like organs from a body, each one a potential spare part for
              something else. You lay them out in order on a rag and the machine's design
              language becomes readable. How it was built tells you what it was built to do.
            limits: >
              Some things are built not to come apart. Sealed units, welded casings,
              tamper-proof housings — force them and you destroy the components inside.
              Pre-war military tech often has anti-tampering measures that range from
              voided warranties to incendiary charges. Not everything wants to be opened.
      tier_2:
        name: "Tinker"
        description: "Dead machines wake up when you touch them. The Ancients built things to last, and you've learned to listen."
        abilities:
          - name: "Tech Whispering"
            experience: >
              You press your ear to the casing and listen. Pre-war machines have a language
              of hums and clicks and the absence of both. A healthy power cell has a steady
              tone. A dying servo whines at a frequency you feel in your teeth. You run your
              fingertips over the housing and the micro-vibrations tell you what's spinning,
              what's stuck, and what's about to shatter. The Ancients built machines that
              wanted to work. Most of them are just waiting for someone to ask them nicely.
            limits: >
              Listening requires silence, and the wasteland doesn't provide much. Wind,
              settlement noise, your own heartbeat — all of it masks the machine's voice.
              And some machines have been alone so long that their signals have drifted into
              patterns you can't parse. The oldest tech speaks a dialect that might as well
              be a different language.
          - name: "Power Splice"
            experience: >
              You strip the wires by feel — gauge, material, voltage tolerance all read
              through your fingertips. The splice itself is delicate: match the polarity,
              bridge the gap, don't let the leads touch anything grounded. When the current
              flows, you feel it through the insulation like warmth through glass. A dead
              screen flickers. A motor coughs and catches. A light comes on in a room that
              hasn't been lit in centuries, and for a moment you see the world the Ancients
              built, dusty and waiting and still functional underneath.
            limits: >
              Wrong polarity fries components permanently. Overload a circuit and the
              feedback travels up the splice to your hands — burns at best, cardiac arrest
              at worst. Pre-war power systems operate at voltages the wasteland hasn't
              seen in generations, and the safety features that once prevented exactly this
              kind of accident corroded away decades ago.
          - name: "Blueprint Read"
            experience: >
              The schematic unfolds in your mind as you study the device. You can see the
              designer's intent — why this conduit routes here, why this valve opens at that
              pressure, why the whole system hinges on a single regulator buried in the back.
              Pre-war engineers thought in systems, and once you learn their grammar, every
              machine becomes a sentence you can diagram. The blueprint is never on paper
              anymore. It's in the machine itself, written in layout and material choice
              and the particular way components are soldered together.
            limits: >
              Understanding the blueprint doesn't mean you can execute it. Pre-war
              manufacturing tolerances are tighter than anything the wasteland can produce.
              You know exactly what's needed and you can't make it — the alloy doesn't
              exist anymore, the tool to shape it was a one-off, the calibration requires
              instruments that shattered a century ago. Knowledge without means is its
              own frustration.
      tier_3:
        name: "Forge Master"
        description: "You don't just fix what the Ancients built. You understand why they built it, and you can build it better."
        abilities:
          - name: "Ancient Activation"
            experience: >
              The facility has been dead for two hundred years. You walk through it reading
              the systems like a doctor reads a body — power grid here, coolant there,
              the central processor buried three floors down. Your hands move across control
              panels with a certainty that surprises even you, entering sequences that feel
              like muscle memory for muscles you've never used. Lights cascade. Air systems
              groan to life. Screens boot to interfaces designed for people who've been dead
              for centuries. The building wakes up around you, and you can feel it assessing
              whether you're authorized. You're not. But you know enough to fake it.
            limits: >
              Ancient systems have security. Not passwords — actual defenses. Gas vents,
              electrified floors, automated turrets, containment protocols that seal you
              inside. Activate the wrong system in the wrong order and the facility decides
              you're an intruder. Some facilities activated their defenses when the world
              ended and never stood down. Waking those up means waking up something that's
              been guarding an empty building with lethal force for two centuries.
          - name: "Mastercraft"
            experience: >
              The device you build didn't exist before. Not in the old world, not in the
              new one. You take pre-war components and wasteland ingenuity and fuse them
              into something that works by principles the Ancients would recognize but
              never combined this way. The energy cell from a medical scanner powers a
              weapon. The servo from a factory arm becomes a prosthetic that responds to
              thought. Each creation is an argument — proof that the world isn't just
              scavenging the past, it's building a future from the parts.
            limits: >
              Mastercraft devices are irreplaceable. Each one uses components that can't
              be sourced again, assembled with knowledge that lives only in your head. Break
              it and it's gone. Worse, the combinations you create are untested — they work
              until they encounter a load condition nobody anticipated, and then they fail
              in ways that are as novel as their construction. Your masterwork is also
              your prototype, and prototypes have no safety margin.
          - name: "System Override"
            experience: >
              The Ancient security panel blinks red and you place your hands on the
              interface and think at it. Not type — think. Your fingers move in patterns
              you didn't learn, entering override sequences that feel like they've been
              waiting in your muscle memory for two hundred years. The system resists,
              then reconsiders, then accepts you with a chime that nobody has heard since
              before the collapse. Doors open. Turrets stand down. The facility recognizes
              you as something you're not, and you've learned not to correct it. Access
              is access.
            limits: >
              Override authority isn't unlimited. Military-grade systems have layered
              security that treats each successful override as an escalating threat level.
              Get through three doors and the fourth one doesn't just lock — it triggers
              containment. And some systems are smart enough to learn your patterns. Use
              the same override approach twice and the system adapts, locking you out
              permanently with a politeness that makes it worse.

  - name: "Wasteland"
    description: "Survival, navigation, environmental adaptation, reading the ruined world"
    triggers:
      - "surviving in hostile terrain"
      - "navigating between settlements"
      - "finding water, food, or shelter"
      - "reading weather, radiation, or terrain"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Drifter"
        description: "You've lived out there long enough to stop dying from the obvious things. The non-obvious things are next."
        abilities:
          - name: "Rad Sense"
            experience: >
              It's a taste, mostly. Copper and ozone and something sweet that doesn't belong
              in your mouth. Hot zones announce themselves before the dosimeter clicks — a
              prickling in the sinuses, a warmth on the skin that isn't sunlight. You've
              learned to read the landscape for the signs: bleached soil, glass-smooth stone,
              plants that grow too fast and too wrong. The radiation has a geography, and
              you've memorized its borders the way a fisherman memorizes reefs.
            limits: >
              Low-level radiation is invisible to the sense. The zones that kill slowly —
              the ones that don't taste like anything, don't prickle, just quietly rewrite
              your cells over weeks — those are the ones that get you. Rad sense catches
              the bonfire. It misses the ember in your boot.
          - name: "Scrounge"
            experience: >
              Where others see rubble, you see lunch. The canned goods behind the collapsed
              wall, the water pooled in the rooftop cistern that nobody thought to check,
              the edible fungus growing in the elevator shaft. Your hands know which
              containers are sealed and which are compromised by weight alone. You eat things
              that would make a vault-dweller gag and you've stopped apologizing for it.
              The wasteland provides, but only to those who know where it keeps its pantry.
            limits: >
              Scavenged food is a gamble. Cans swell, water sources get contaminated
              between visits, and the fungus that was safe last season mutated over winter.
              Your gut has developed tolerances that would horrify a doctor, but tolerance
              isn't immunity. One bad find puts you on your back for days, sweating and
              purging, burning calories you can't spare.
          - name: "Shelter Eye"
            experience: >
              You scan the terrain and the shelter reveals itself — the overhanging slab
              that blocks wind from the north, the drainage culvert that stays dry in rain,
              the basement with only one entrance that can be barricaded. You think in
              defensible positions automatically: sight lines, escape routes, distance from
              water. A good camp is invisible from twenty paces and survivable for a week.
              You've slept in worse places than anyone you'll ever meet, and you're still
              here.
            limits: >
              The best shelter is someone else's territory. The overhang is a predator's
              den. The culvert is a raider stash. The basement has something living in it
              that you didn't hear until you'd already blocked the door. In the wasteland,
              every safe place was safe for something else first.
      tier_2:
        name: "Wayfinder"
        description: "The wasteland has stopped trying to kill you with the easy stuff. Now it uses the hard stuff."
        abilities:
          - name: "Dead Reckoning"
            experience: >
              The sun, the wind, the angle of shadows, the direction the dust blows — you
              triangulate without thinking. Landmarks that would mean nothing to a vault-born
              are your road signs: the twisted radio tower, the crater lake, the highway
              overpass that points northeast. You keep a map in your head that updates with
              every journey, distances measured in days of walking and water consumption.
              People who travel with you stop asking how far because you're always right
              to within an hour.
            limits: >
              Dust storms erase every landmark at once. Magnetic anomalies from Ancient
              tech make compasses spin. And the wasteland shifts — landslides block passes,
              rivers change course after flash floods, settlements relocate without notice.
              Your mental map is only as current as your last visit, and the wasteland
              has a short memory for geography.
          - name: "Weather Read"
            experience: >
              You feel the rad-storm building three hours before the sky changes color. The
              pressure drops in a way that has nothing to do with normal weather — a heaviness
              in the air that tastes of static and makes your fillings ache. The wind shifts
              and carries a smell like burning plastic. You know the difference between a
              sandstorm that passes in an hour and one that strips paint from metal, between
              rain that's safe to drink and rain that'll blister your skin. The wasteland's
              weather is a language of threats, and you're fluent.
            limits: >
              Anomaly weather — the storms that form around Ancient facilities, the
              permanent fog banks over contaminated zones, the lightning that strikes upward
              — follows no rules you can read. Your instincts say clear skies while the
              horizon turns a color that doesn't have a name. In anomaly territory, trust
              your weather sense and it'll walk you into the worst of it.
          - name: "Terrain Mastery"
            experience: >
              The rubble field that stops everyone else is a highway for you. You read the
              debris — load-bearing slabs, stable footholds, the paths where water has
              compacted the loose material. Your weight shifts automatically to match the
              surface. Scree, swamp, irradiated glass flats, the canopy of a mutant forest
              — each terrain has a rhythm, and your body has learned them all. You move
              through the wasteland the way the wasteland moves through itself: efficiently,
              without wasted effort, following the path of least resistance that nobody
              else can see.
            limits: >
              Confidence in familiar terrain makes you reckless in new terrain. The glass
              flats near the crater look like the ones you've crossed a dozen times, but
              these are thinner, and the void beneath them is deeper. Every terrain type
              has a local variant that breaks the rules, and assuming you've seen it all
              is the last mistake good wayfinders make.
      tier_3:
        name: "Pathbreaker"
        description: "You don't follow routes through the wasteland. You are the route. Caravans follow your footprints."
        abilities:
          - name: "Wasteland Communion"
            experience: >
              You press your hand to the irradiated soil and the wasteland opens up. Not
              in words — in feeling. The water table, fifty meters down and moving south.
              The rad pocket, buried under the collapsed overpass. The settlement three
              days west where the smoke means cooking fires, not raiders. The land speaks
              in gradients and pressures and the particular silence of places where nothing
              lives. You've spent so long out here that the boundary between your senses
              and the terrain itself has worn thin. You don't read the wasteland anymore.
              You feel it the way you feel your own heartbeat.
            limits: >
              Deep contamination zones feed you false information. The land around Ancient
              weapon sites, bio-labs, and reactor meltdowns has been so thoroughly poisoned
              that the communion returns noise — or worse, signals that seem coherent but
              lead you toward the contamination source. The wasteland isn't malicious, but
              corrupted land doesn't know it's lying.
          - name: "Nomad's Endurance"
            experience: >
              Days blur into a rhythm: walk, rest, drink, walk. Your body has found an
              efficiency that would make a machine jealous — minimal water, minimal food,
              maximum distance. Your muscles operate below the threshold of fatigue, a
              sustainable burn that can continue longer than anyone tracking you believes
              possible. You've crossed the Open Dust in conditions that killed the pack
              animals. You arrive thinner, quieter, and still standing, because the
              wasteland taught you that endurance isn't strength. It's the willingness to
              keep moving when every signal in your body says stop.
            limits: >
              Endurance isn't invulnerability. You can keep walking long after you should
              have stopped, and the body starts cashing checks it can't cover — joints
              grinding, kidneys struggling, muscles consuming themselves for fuel. You've
              seen the look in other nomads' eyes when the endurance becomes a trap: they
              can't stop, because stopping means confronting the damage, and the damage is
              worse than they thought. Some of them are still walking.
          - name: "Safe Passage"
            experience: >
              You walk through the rad-storm and it parts around you. Not literally — but
              close enough. Your body has learned the storm's anatomy: the eye walls, the
              fallout bands, the corridors of merely dangerous between the corridors of
              lethal. You move through toxic terrain the way a surgeon moves through a body,
              navigating between the things that kill and the things that merely hurt. People
              following you step exactly where you step, breathe when you breathe, and
              arrive on the other side wondering how you made the impossible look like a
              nature walk.
            limits: >
              Safe passage through a storm isn't safe — it's less lethal. The exposure
              accumulates. Each crossing deposits a little more in your bones, dims your
              rad sense a little further, moves the baseline of what your body considers
              normal a little closer to the threshold. The best pathbreakers in the
              wasteland glow faintly in the dark, and they'll tell you it's fine. Their
              dosimeters tell a different story.

